<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0b" />
  <title>PlanePulse</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
  <style>
    @font-face{font-family:'Stack Sans Text';src:url('/fonts/StackSansText.woff2') format('woff2');font-weight:100 900;font-style:normal;font-display:swap;}
    :root{--yellow:#FFC800;--bg:#080808;--text:#fff;--muted:#9b9b9b;--line:rgba(255,200,0,.32);--glass:rgba(0,0,0,.5)}
    *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Stack Sans Text',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;}
    body{letter-spacing:.02em}.bg{position:fixed;inset:0;background:#090909 center/cover no-repeat;transform:scale(1.02)}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5)}
    .app{position:relative;z-index:2;height:100vh;padding:22px 34px 28px;display:flex;flex-direction:column}.top{height:44px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;font-size:18px;color:#e9e9e9}.brand{color:var(--yellow);font-weight:700;letter-spacing:.08em}.weather{text-align:right;color:#e7e7e7}.gear{position:absolute;right:28px;top:70px;background:transparent;border:0;color:var(--yellow);font-size:26px;cursor:pointer;z-index:8}.line{height:1px;background:var(--line);width:100%}
    .hero{flex:1;display:grid;grid-template-columns:25% 50% 25%;align-items:center;min-height:0}.side{height:100%;display:flex;align-items:center;justify-content:center}.airlineLogo{max-width:150px;max-height:80px;object-fit:contain;filter:drop-shadow(0 8px 18px rgba(0,0,0,.35))}.logoFallback{font-size:44px;color:var(--yellow);font-weight:800;border:1px solid rgba(255,200,0,.35);border-radius:18px;padding:18px 22px;min-width:110px;text-align:center}.center{text-align:center;align-self:center}.badge{font-size:11px;letter-spacing:.26em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}.callsign{font-size:clamp(56px,9vw,132px);line-height:.9;color:var(--yellow);font-weight:800;letter-spacing:.04em}.planeIcon{width:min(130px,16vw);height:min(130px,16vw);margin:26px auto 12px;display:block;color:var(--yellow);filter:drop-shadow(0 0 22px rgba(255,200,0,.18))}.typeReg{font-size:clamp(19px,2.6vw,34px);color:#f4f4f4;font-weight:500;letter-spacing:.06em}.next{margin-top:18px;color:var(--muted);font-size:clamp(13px,1.45vw,20px);letter-spacing:.04em;white-space:nowrap}.compassWrap{display:flex;flex-direction:column;align-items:center;gap:18px;transform:translateY(18px)}.climbArrow{font-size:42px;line-height:1;color:var(--yellow);text-shadow:0 0 18px rgba(255,200,0,.18)}.climbArrow.pulse{animation:pulse 1.8s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.65;transform:scale(.98)}50%{opacity:1;transform:scale(1.06)}}.compass{position:relative;width:126px;height:126px;border-radius:50%;border:1px solid rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;color:#fff}.compass:before,.compass:after{content:"";position:absolute;background:rgba(255,255,255,.16)}.compass:before{width:1px;height:86px}.compass:after{height:1px;width:86px}.headingArrow{position:absolute;font-size:36px;color:var(--yellow);z-index:2;line-height:1}.headingText{position:absolute;bottom:-30px;color:#d8d8d8;font-size:18px;letter-spacing:.08em}.metrics{height:142px;display:grid;grid-template-columns:repeat(3,1fr);align-items:center;text-align:center}.metricVal{font-size:clamp(26px,4vw,54px);font-weight:700;color:#fff}.metricLabel{margin-top:10px;font-size:clamp(12px,1.2vw,17px);color:var(--muted);letter-spacing:.12em;text-transform:uppercase;display:flex;align-items:center;justify-content:center;gap:8px}.miniIcon{width:17px;height:17px;color:var(--yellow);display:inline-block}.status{position:absolute;left:34px;bottom:12px;color:rgba(255,255,255,.45);font-size:12px}.settingsOverlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.68);display:none}.settingsOverlay.open{display:block}.settingsPanel{position:fixed;right:22px;top:22px;z-index:10000;width:min(420px,calc(100vw - 44px));max-height:calc(100vh - 44px);overflow:auto;background:rgba(12,12,12,.96);border:1px solid rgba(255,200,0,.28);border-radius:24px;padding:22px;box-shadow:0 24px 80px rgba(0,0,0,.55)}.settingsHead{display:flex;justify-content:space-between;align-items:center;color:var(--yellow);font-size:20px;font-weight:800;margin-bottom:20px}.close{background:transparent;color:#fff;border:0;font-size:26px;cursor:pointer}.group{border-top:1px solid rgba(255,255,255,.12);padding-top:16px;margin-top:16px}.group h3{font-size:13px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin:0 0 12px}.row{display:flex;gap:10px;margin:10px 0}.row label{flex:1;color:#fff;font-size:14px}.row input,.row select{width:100%;background:#181818;color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:10px 12px}.toggle{display:flex;gap:10px}.toggle button{flex:1;padding:11px;border-radius:12px;border:1px solid rgba(255,200,0,.25);background:#151515;color:#fff}.toggle button.active{background:var(--yellow);color:#000;border-color:var(--yellow);font-weight:800}.hint{color:var(--muted);font-size:12px;line-height:1.45;margin-top:10px}@media(max-width:760px){.app{padding:16px}.hero{grid-template-columns:22% 56% 22%}.airlineLogo{max-width:86px}.compass{width:82px;height:82px}.climbArrow{font-size:28px}.headingArrow{font-size:25px}.metrics{height:120px}.next{white-space:normal}.top{font-size:14px}.gear{top:58px;right:16px}}
  </style>
</head>
<body>
  <div class="bg" id="bg"></div><div class="overlay"></div>
  <main class="app">
    <button class="gear" id="settingsBtn" aria-label="Settings">⚙</button>
    <header class="top"><div id="clock">--:--</div><div class="brand">PlanePulse</div><div class="weather"><span id="temp">--°C</span> &nbsp; <span id="wind">-- km/h</span></div></header>
    <div class="line"></div>
    <section class="hero">
      <aside class="side"><img id="airlineLogo" class="airlineLogo" alt="Airline logo" /><div id="logoFallback" class="logoFallback">PP</div></aside>
      <section class="center">
        <div class="badge">Flight</div>
        <div id="callsign" class="callsign">NO DATA</div>
        <svg class="planeIcon" viewBox="0 0 256 256" aria-hidden="true"><path fill="currentColor" d="M235 144.6 146.5 116 133 22.7c-.7-5-4.9-8.7-10-8.7s-9.3 3.7-10 8.7L99.5 116 11 144.6c-5.1 1.7-8 7-6.6 12.2 1.4 5.2 6.6 8.4 11.8 7.3l80.1-16.4-7.5 51.5-29.7 17.7c-4 2.4-5.8 7.2-4.4 11.6 1.4 4.4 5.5 7.5 10.1 7.5h126.4c4.6 0 8.7-3 10.1-7.5 1.4-4.4-.4-9.2-4.4-11.6l-29.7-17.7-7.5-51.5 80.1 16.4c5.3 1.1 10.4-2.1 11.8-7.3 1.4-5.2-1.5-10.5-6.6-12.2Z"/></svg>
        <div id="typeReg" class="typeReg">Aircraft</div>
        <div id="next" class="next">--</div>
      </section>
      <aside class="side"><div class="compassWrap"><div id="climbArrow" class="climbArrow">→</div><div class="compass"><div id="headingArrow" class="headingArrow">↗</div><div id="headingText" class="headingText">--</div></div></div></aside>
    </section>
    <div class="line"></div>
    <section class="metrics"><div><div id="distance" class="metricVal">--</div><div class="metricLabel"><svg class="miniIcon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2 3 21l9-4 9 4-9-19Zm0 5.3 4.6 9.8-4.6-2-4.6 2L12 7.3Z"/></svg>Distance</div></div><div><div id="altitude" class="metricVal">--</div><div class="metricLabel"><svg class="miniIcon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 3 4 11h5v10h6V11h5l-8-8Z"/></svg>Altitude</div></div><div><div id="speed" class="metricVal">--</div><div class="metricLabel"><svg class="miniIcon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 4a9 9 0 0 0-9 9c0 2.2.8 4.2 2.1 5.8h13.8A8.96 8.96 0 0 0 21 13a9 9 0 0 0-9-9Zm1 9.4 4-5.4-5.4 4a2 2 0 1 0 1.4 1.4Z"/></svg>Speed</div></div></section>
    <div class="line"></div><div class="status" id="status">Starting…</div>
  </main>
  <div class="settingsOverlay" id="settingsOverlay"><div class="settingsPanel"><div class="settingsHead">Settings<button class="close" id="closeSettings">×</button></div><div class="group"><h3>Location source</h3><div class="toggle"><button id="gpsBtn">Device GPS</button><button id="fixedBtn">Fixed</button></div><p class="hint" id="gpsHint">GPS works on HTTPS after permission.</p></div><div class="group"><h3>Fixed location</h3><div class="row"><label>Latitude<input id="latInput" type="number" step="0.0001"></label><label>Longitude<input id="lonInput" type="number" step="0.0001"></label></div></div><div class="group"><h3>Display</h3><div class="row"><label>Radius km<input id="radiusInput" type="number" min="5" max="200"></label><label>Mode<select id="modeInput"><option value="closest">Closest aircraft</option><option value="lowest">Lowest aircraft</option><option value="audible">Most audible</option></select></label></div><div class="toggle"><button id="photoOn">Photos ON</button><button id="photoOff">Photos OFF</button></div><p class="hint">Aircraft photo background is experimental. The icon remains visible even when a photo is found.</p></div></div></div>
  <script>
    const $=id=>document.getElementById(id); const S={lat:60.293,lon:25.037,radius:50,mode:'closest',gps:false,photos:true,...JSON.parse(localStorage.ppSettings||'{}')}; let current={...S}; let lastKey='';
    function save(){localStorage.ppSettings=JSON.stringify(S)} function km(n){return Number.isFinite(n)?`${n.toFixed(1)} km`:'--'} function meters(ft){return Number.isFinite(ft)?Math.round(ft*0.3048):NaN} function kmh(kts){return Number.isFinite(kts)?Math.round(kts*1.852):NaN} function dirName(deg){if(!Number.isFinite(deg))return'--';return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(deg/22.5)%16]} function arrowByDeg(d){ if(!Number.isFinite(d))return '→'; const a=((d%360)+360)%360; return a<22.5||a>=337.5?'↑':a<67.5?'↗':a<112.5?'→':a<157.5?'↘':a<202.5?'↓':a<247.5?'↙':a<292.5?'←':'↖'}
    function airlineFromCallsign(cs){const p=(cs||'').replace(/[^A-Z]/g,'').slice(0,3); const map={FIN:'finnair',RYR:'ryanair',DLH:'lufthansa',SAS:'sas',KLM:'klm',AFR:'airfrance',BAW:'britishairways',EZY:'easyjet',NAX:'norwegian',NSZ:'norwegian',TAY:'tnt'}; return map[p]||''} function setLogo(cs){const code=airlineFromCallsign(cs); const img=$('airlineLogo'), fb=$('logoFallback'); if(code){img.src=`https://logo.clearbit.com/${code}.com`; img.style.display='block'; fb.style.display='none'; img.onerror=()=>{img.style.display='none';fb.style.display='block';fb.textContent=(cs||'PP').slice(0,3)}}else{img.style.display='none';fb.style.display='block';fb.textContent=(cs||'PP').slice(0,3)}}
    async function loc(){if(!S.gps) return {lat:S.lat,lon:S.lon}; return new Promise(res=>navigator.geolocation?navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lon:p.coords.longitude}),()=>res({lat:S.lat,lon:S.lon}),{enableHighAccuracy:true,timeout:5000}):res({lat:S.lat,lon:S.lon}))}
    async function fetchJSON(url){const r=await fetch(url,{cache:'no-store'}); if(!r.ok)throw new Error(r.status); return r.json()} function choose(ac){if(!ac.length)return null; if(S.mode==='lowest')return [...ac].sort((a,b)=>(a.alt_baro||999999)-(b.alt_baro||999999))[0]; if(S.mode==='audible')return [...ac].sort((a,b)=>score(b)-score(a))[0]; return [...ac].sort((a,b)=>(a.distanceKm||999)-(b.distanceKm||999))[0]} function score(a){const alt=meters(a.alt_baro); return Math.max(0,60-(a.distanceKm||99))*2 + Math.max(0,4000-(alt||9999))/80}
    async function tick(){try{const p=await loc(); current=p; const data=await fetchJSON(`/api/aircraft?lat=${p.lat}&lon=${p.lon}&radius=${S.radius}`); const list=(data.aircraft||data.ac||[]).filter(a=>Number.isFinite(a.distanceKm)); const main=choose(list); updateWeather(p); if(!main){$('callsign').textContent='NO DATA'; $('status').textContent='No aircraft nearby'; return} render(main, list); $('status').textContent=`${list.length} aircraft nearby`; }catch(e){$('status').textContent='Data error'; console.error(e)}}
    async function updateWeather(p){try{const w=await fetchJSON(`/api/weather?lat=${p.lat}&lon=${p.lon}`); $('temp').textContent=`${Math.round(w.temperature)}°C`; $('wind').textContent=`${Math.round(w.wind)} km/h`}catch(e){}}
    async function setPhoto(a){const bg=$('bg'); if(!S.photos){bg.style.backgroundImage='';return} const reg=a.r||a.reg||a.registration||''; if(!reg){bg.style.backgroundImage='';return} try{const p=await fetchJSON(`/api/photo?reg=${encodeURIComponent(reg)}`); if(p.url) bg.style.backgroundImage=`url('${p.url}')`; else bg.style.backgroundImage='';}catch(e){bg.style.backgroundImage=''}}
    function render(a,list){const cs=(a.flight||a.call||a.callsign||a.hex||'UNKNOWN').trim(); const reg=a.r||a.reg||a.registration||''; const typ=a.t||a.type||a.aircraft_type||'Aircraft'; $('callsign').textContent=cs; $('typeReg').textContent=reg?`${typ} • ${reg}`:typ; setLogo(cs); $('distance').textContent=km(a.distanceKm); $('altitude').textContent=Number.isFinite(a.alt_baro)?`${meters(a.alt_baro)} m`:'--'; $('speed').textContent=Number.isFinite(a.gs)?`${kmh(a.gs)} km/h`:'--'; const next=list.filter(x=>(x.hex||x.flight)!==(a.hex||a.flight)).sort((x,y)=>x.distanceKm-y.distanceKm).slice(0,2).map(x=>`${(x.flight||x.call||x.hex||'--').trim()} ${km(x.distanceKm)}`).join('  |  '); $('next').textContent=next||''; const trk=Number(a.track); $('headingArrow').textContent=arrowByDeg(trk); $('headingText').textContent=dirName(trk); const vr=Number(a.baro_rate||a.geom_rate||0); const ca=$('climbArrow'); ca.textContent=vr>150?'↗':vr<-150?'↘':'→'; ca.classList.toggle('pulse',Math.abs(vr)>150); const key=cs+reg; if(key!==lastKey){lastKey=key; setPhoto(a)}}
    function initSettings(){['lat','lon','radius'].forEach(k=>$(k+'Input')&&($(k+'Input').value=S[k])); $('modeInput').value=S.mode; function refresh(){ $('gpsBtn').classList.toggle('active',S.gps); $('fixedBtn').classList.toggle('active',!S.gps); $('photoOn').classList.toggle('active',S.photos); $('photoOff').classList.toggle('active',!S.photos)} refresh(); $('settingsBtn').onclick=()=>$('settingsOverlay').classList.add('open'); $('closeSettings').onclick=()=>$('settingsOverlay').classList.remove('open'); $('settingsOverlay').onclick=e=>{if(e.target.id==='settingsOverlay')$('settingsOverlay').classList.remove('open')}; $('gpsBtn').onclick=()=>{S.gps=true;save();refresh();tick()}; $('fixedBtn').onclick=()=>{S.gps=false;save();refresh();tick()}; $('photoOn').onclick=()=>{S.photos=true;save();refresh();tick()}; $('photoOff').onclick=()=>{S.photos=false;save();refresh();$('bg').style.backgroundImage=''}; $('latInput').onchange=e=>{S.lat=parseFloat(e.target.value)||S.lat;save();tick()}; $('lonInput').onchange=e=>{S.lon=parseFloat(e.target.value)||S.lon;save();tick()}; $('radiusInput').onchange=e=>{S.radius=parseFloat(e.target.value)||S.radius;save();tick()}; $('modeInput').onchange=e=>{S.mode=e.target.value;save();tick()}}
    function clock(){const d=new Date(); $('clock').textContent=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});} initSettings(); clock(); setInterval(clock,1000); tick(); setInterval(tick,10000); if('serviceWorker'in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
  </script>
</body>
</html>
