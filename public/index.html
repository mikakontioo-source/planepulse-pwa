<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PlanePulse</title>
  <meta name="theme-color" content="#FFC800" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="PlanePulse" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="shortcut icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <style>
    @font-face {
      font-family: "Stack Sans Text";
      src: url("/fonts/StackSansText.woff2") format("woff2");
      font-display: swap;
    }
    :root{
      --yellow:#FFC800;
      --bg:#080808;
      --white:#ffffff;
      --muted:rgba(255,255,255,.58);
      --line:rgba(255,200,0,.22);
      --panel:rgba(0,0,0,.45);
    }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--white);font-family:"Stack Sans Text", "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;overflow:hidden;}
    body{letter-spacing:.01em;}
    .app{position:relative;width:100vw;height:100vh;min-height:100vh;display:flex;flex-direction:column;padding:28px 44px;background:radial-gradient(circle at 50% 10%,rgba(255,200,0,.08),transparent 40%),#080808;}
    .photoBg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .2s ease;z-index:0;}
    .photoBg.show{opacity:1;}
    .overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:1;}
    .content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;}
    header{height:58px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;font-size:18px;color:var(--muted);font-weight:500;}
    .brand{color:var(--yellow);font-size:20px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;}
    .topRight{text-align:right;display:flex;gap:18px;justify-content:flex-end;align-items:center;}
    .divider{height:1px;background:var(--line);width:100%;}
    main{flex:1;display:grid;grid-template-columns:22% 56% 22%;align-items:center;min-height:0;}
    .airline{display:flex;justify-content:center;align-items:center;height:100%;}
    .airlineBadge{width:132px;height:132px;border-radius:28px;background:rgba(255,255,255,.95);display:flex;align-items:center;justify-content:center;color:#111;font-weight:900;font-size:22px;text-align:center;line-height:1.05;padding:14px;box-shadow:0 20px 80px rgba(0,0,0,.35);}
    .hero{text-align:center;align-self:center;}
    .flightCode{font-size:clamp(72px,10vw,156px);line-height:.9;color:var(--yellow);font-weight:800;letter-spacing:.02em;margin:0;}
    .planeIcon{width:88px;height:88px;margin:34px auto 18px;color:var(--yellow);}
    .typeReg{font-size:clamp(22px,2.2vw,36px);font-weight:600;color:var(--white);letter-spacing:.04em;margin-bottom:14px;}
    .next{font-size:clamp(14px,1.25vw,20px);color:rgba(255,255,255,.52);font-weight:500;letter-spacing:.04em;min-height:1.4em;}
    .compassWrap{height:100%;display:flex;align-items:center;justify-content:center;}
    .compassBox{text-align:center;min-width:150px;}
    .climbArrow{font-size:42px;line-height:1;color:var(--yellow);margin-bottom:26px;text-shadow:0 0 20px rgba(255,200,0,.25);}
    .compass{width:122px;height:122px;border-radius:50%;border:1px solid rgba(255,255,255,.35);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;position:relative;color:rgba(255,255,255,.86);}
    .compass:before{content:"";width:8px;height:8px;background:var(--yellow);border-radius:50%;display:block;box-shadow:0 0 18px rgba(255,200,0,.45)}
    .direction{font-size:22px;color:var(--white);font-weight:600;letter-spacing:.08em;}
    .metrics{padding:26px 0 22px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px;text-align:center;}
    .metricValue{font-size:clamp(28px,3.3vw,52px);font-weight:700;color:var(--white);line-height:1.05;}
    .metricLabel{margin-top:8px;font-size:clamp(13px,1.1vw,18px);color:var(--muted);font-weight:500;letter-spacing:.08em;text-transform:uppercase;}
    .settingsBtn{position:fixed;right:22px;bottom:22px;z-index:20;width:48px;height:48px;border:1px solid rgba(255,200,0,.28);background:rgba(0,0,0,.38);color:var(--yellow);border-radius:50%;font-size:22px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(12px);}
    .settingsOverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:9999;}
    .settingsOverlay.open{display:block;}
    .settingsPanel{position:fixed;top:24px;right:24px;width:min(420px,calc(100vw - 48px));max-height:calc(100vh - 48px);overflow-y:auto;background:rgba(13,13,13,.96);border:1px solid rgba(255,200,0,.28);border-radius:24px;padding:24px;box-shadow:0 30px 120px rgba(0,0,0,.65);z-index:10000;}
    .settingsPanel h2{margin:0 0 20px;color:var(--yellow);font-size:22px;}
    .settingGroup{border-top:1px solid rgba(255,255,255,.08);padding:16px 0;}
    .settingGroup label{display:block;color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
    input,select{width:100%;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:#080808;color:#fff;font:inherit;}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .closeBtn{margin-top:12px;width:100%;padding:12px;border:0;border-radius:14px;background:var(--yellow);color:#000;font-weight:800;font:inherit;}
    .status{position:fixed;left:20px;bottom:20px;z-index:5;color:rgba(255,255,255,.36);font-size:12px;}
    @media(max-width:760px){.app{padding:22px}.airlineBadge{width:82px;height:82px;font-size:14px;border-radius:18px}main{grid-template-columns:20% 60% 20%}.compass{width:78px;height:78px}.direction{font-size:15px}.climbArrow{font-size:28px}.planeIcon{width:62px;height:62px}.metrics{gap:6px}.topRight{gap:8px;font-size:13px}.brand{font-size:14px}header{font-size:13px}}
  </style>
</head>
<body>
  <div class="app">
    <div id="photoBg" class="photoBg"></div><div class="overlay"></div>
    <div class="content">
      <header><div id="clock">--:--</div><div class="brand">PlanePulse</div><div class="topRight"><span id="temp">--°C</span><span id="wind">-- km/h</span></div></header>
      <div class="divider"></div>
      <main>
        <section class="airline"><div id="airlineLogo" class="airlineBadge">PP</div></section>
        <section class="hero">
          <h1 id="flightCode" class="flightCode">NO DATA</h1>
          <svg class="planeIcon" viewBox="0 0 100 100" aria-hidden="true"><path fill="currentColor" d="M50 4c4 0 7 3 7 7v26l32 20v9L57 55v24l12 8v7L50 88 31 94v-7l12-8V55L11 66v-9l32-20V11c0-4 3-7 7-7z"/></svg>
          <div id="typeReg" class="typeReg">Waiting for aircraft</div>
          <div id="next" class="next"></div>
        </section>
        <section class="compassWrap"><div class="compassBox"><div id="climbArrow" class="climbArrow">→</div><div class="compass"><span></span></div><div id="direction" class="direction">--</div></div></section>
      </main>
      <div class="divider"></div>
      <section class="metrics">
        <div><div id="distance" class="metricValue">--</div><div class="metricLabel">Distance</div></div>
        <div><div id="altitude" class="metricValue">--</div><div class="metricLabel">Altitude</div></div>
        <div><div id="speed" class="metricValue">--</div><div class="metricLabel">Speed</div></div>
      </section>
      <div class="divider"></div>
    </div>
    <div id="status" class="status">Loading…</div>
    <button id="settingsBtn" class="settingsBtn">⚙</button>
    <div id="settingsOverlay" class="settingsOverlay"><div class="settingsPanel"><h2>Settings</h2><div class="settingGroup"><label>Location Source</label><select id="locationSource"><option value="fixed">Fixed Location</option><option value="gps">Device GPS</option></select></div><div class="settingGroup"><label>Fixed Location</label><div class="row"><input id="lat" placeholder="Latitude" value="60.293"><input id="lon" placeholder="Longitude" value="25.037"></div></div><div class="settingGroup"><label>Radius</label><select id="radius"><option value="25">25 km</option><option value="50" selected>50 km</option><option value="100">100 km</option></select></div><div class="settingGroup"><label>Aircraft Photos</label><select id="photos"><option value="on" selected>On (Experimental)</option><option value="off">Off</option></select></div><button id="closeSettings" class="closeBtn">Close</button></div></div>
  </div>
  <script>
    const $=id=>document.getElementById(id);let settings={lat:60.293,lon:25.037,radius:50,source:'fixed',photos:'on'};
    function tick(){const d=new Date();$('clock').textContent=d.toLocaleTimeString('fi-FI',{hour:'2-digit',minute:'2-digit'});}setInterval(tick,1000);tick();
    function kmToNm(km){return Math.max(1,Math.round(km/1.852));}
    function hav(lat1,lon1,lat2,lon2){const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180,a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
    function bearing(lat1,lon1,lat2,lon2){const y=Math.sin((lon2-lon1)*Math.PI/180)*Math.cos(lat2*Math.PI/180),x=Math.cos(lat1*Math.PI/180)*Math.sin(lat2*Math.PI/180)-Math.sin(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.cos((lon2-lon1)*Math.PI/180);return (Math.atan2(y,x)*180/Math.PI+360)%360;}
    function dir(deg){const a=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];return a[Math.round(deg/22.5)%16];}
    function arrow(v){if(v>1)return'↗';if(v<-1)return'↘';return'→';}
    function pickLogo(c){const cs=(c.flight||c.callsign||'').trim().toUpperCase(); if(cs.startsWith('FIN')||cs.startsWith('AY'))return'FIN'; if(cs.startsWith('RYR')||cs.startsWith('FR'))return'RYR'; if(cs.startsWith('DLH')||cs.startsWith('LH'))return'DLH'; if(cs.startsWith('SAS')||cs.startsWith('SK'))return'SAS'; return cs.slice(0,3)||'PP'}
    function reg(c){return c.r||c.reg||c.registration||''}
    async function load(){try{let lat=settings.lat,lon=settings.lon;if(settings.source==='gps'&&navigator.geolocation){await new Promise(res=>navigator.geolocation.getCurrentPosition(p=>{lat=p.coords.latitude;lon=p.coords.longitude;res()},()=>res(),{timeout:3500}))} const url=`/api/aircraft?lat=${lat}&lon=${lon}&dist=${kmToNm(settings.radius)}`;const r=await fetch(url,{cache:'no-store'});const j=await r.json();const list=(j.aircraft||j.ac||[]).filter(a=>a.lat&&a.lon).map(a=>({...a,distance:hav(lat,lon,a.lat,a.lon),bearing:bearing(lat,lon,a.lat,a.lon)})).sort((a,b)=>a.distance-b.distance); if(!list.length){$('flightCode').textContent='NO DATA';$('typeReg').textContent='Waiting for aircraft';$('next').textContent='';$('status').textContent='No aircraft nearby';return} const a=list[0], next=list.slice(1,3).map(x=>`${(x.flight||x.callsign||x.hex||'---').trim()} ${x.distance.toFixed(1)} km`).join(' | '); const type=a.t||a.type||a.desc||'Aircraft'; const registration=reg(a); $('flightCode').textContent=(a.flight||a.callsign||a.hex||'UNKNOWN').trim(); $('airlineLogo').textContent=pickLogo(a); $('typeReg').textContent=registration?`${type} • ${registration}`:type; $('next').textContent=next; $('distance').textContent=`${a.distance.toFixed(1)} km`; $('altitude').textContent=`${Math.round((a.alt_baro||a.alt_geom||0)*0.3048)} m`; $('speed').textContent=`${Math.round((a.gs||0)*1.852)} km/h`; $('direction').textContent=dir(a.bearing); $('climbArrow').textContent=arrow(a.baro_rate||a.geom_rate||0); $('status').textContent='Live ADS-B data'; await weather(lat,lon); await photo(a); }catch(e){$('status').textContent='Connection error';console.error(e)}}
    async function weather(lat,lon){try{const r=await fetch(`/api/weather?lat=${lat}&lon=${lon}`,{cache:'no-store'});const w=await r.json();$('temp').textContent=(w.temperature!==undefined?Math.round(w.temperature)+'°C':'--°C');$('wind').textContent=(w.wind!==undefined?Math.round(w.wind)+' km/h':'-- km/h')}catch{}}
    async function photo(a){const bg=$('photoBg'); if(settings.photos!=='on'){bg.classList.remove('show');return} const registration=reg(a); if(!registration){bg.classList.remove('show');return} try{const r=await fetch(`/api/photo?reg=${encodeURIComponent(registration)}`,{cache:'no-store'});const p=await r.json(); if(p.url){bg.style.backgroundImage=`url('${p.url}')`;bg.classList.add('show')}else bg.classList.remove('show')}catch{bg.classList.remove('show')}}
    $('settingsBtn').onclick=()=>{$('settingsOverlay').classList.add('open')};$('closeSettings').onclick=()=>{$('settingsOverlay').classList.remove('open');settings={lat:parseFloat($('lat').value)||60.293,lon:parseFloat($('lon').value)||25.037,radius:parseFloat($('radius').value)||50,source:$('locationSource').value,photos:$('photos').value};load()};
    if('serviceWorker'in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});load();setInterval(load,10000);
  </script>
</body>
</html>
