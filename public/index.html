<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PlanePulse" />
  <title>PlanePulse</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{--yellow:#FFC800;--bg:#080808;--line:rgba(255,200,0,.32);--text:#fff;--muted:#9a9a9a;--panel:rgba(0,0,0,.42)}
    *{box-sizing:border-box} html,body{height:100%;margin:0;background:#050505;color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow:hidden}
    body{touch-action:manipulation}.app{position:relative;min-height:100dvh;width:100vw;background:radial-gradient(circle at 50% 20%,#1b1b1b 0,#080808 48%,#020202 100%);display:flex;flex-direction:column;padding:22px 38px 26px}.bgPhoto{position:fixed;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity .35s ease;z-index:0}.bgPhoto.visible{opacity:1}.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1}.bgPhoto.visible + .overlay{background:rgba(0,0,0,.75)}.content{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;gap:18px}.topbar{height:44px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;font-size:18px;font-weight:600;letter-spacing:.02em}.brand{justify-self:center;font-weight:800;font-size:20px;letter-spacing:.34em}.brand span{color:#e8e8e8}.brand b{color:var(--yellow);font-weight:800}.topLeft,.topRight{display:flex;align-items:center;gap:10px;color:#f5f5f5}.topRight{justify-self:end}.smallIcon{width:20px;height:20px}.settingsBtn{border:0;background:transparent;padding:8px;margin-left:6px;cursor:pointer}.settingsBtn img{width:23px;height:23px;opacity:.96}.rule{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent)}.hero{flex:1;display:grid;grid-template-columns:22% 56% 22%;align-items:center;min-height:0}.airlineBox{display:flex;align-items:center;justify-content:center;height:100%;}.airlineLogo{max-width:150px;max-height:90px;object-fit:contain;filter:drop-shadow(0 12px 24px rgba(0,0,0,.45))}.airlineFallback{display:flex;flex-direction:column;align-items:center;gap:18px;color:#fff;font-weight:800}.airlineFallback .bubble{width:120px;height:120px;border-radius:50%;background:var(--yellow);color:#050505;display:flex;align-items:center;justify-content:center;font-size:42px;font-weight:800;letter-spacing:-.04em}.airlineFallback .name{font-size:26px;letter-spacing:-.04em;color:#fff}.centerStage{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0}.label{font-size:13px;letter-spacing:.28em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}.flightCode{font-size:clamp(58px,10vw,132px);line-height:.9;font-weight:800;letter-spacing:.02em;color:var(--yellow);text-shadow:0 0 28px rgba(255,200,0,.14)}.mainPlane{width:clamp(74px,9vw,122px);height:clamp(74px,9vw,122px);margin:20px 0 12px;opacity:.96;filter:drop-shadow(0 0 18px rgba(255,255,255,.10))}.typeReg{font-size:clamp(22px,3.6vw,42px);font-weight:700;letter-spacing:.06em}.nextNearby{margin-top:16px;color:var(--muted);font-size:clamp(14px,1.8vw,22px);font-weight:600;letter-spacing:.04em;min-height:28px}.compassBox{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}.climbArrow{width:34px;height:34px;margin-bottom:30px}.climbArrow.pulse{animation:pulse 1.8s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.55;transform:scale(.96) rotate(var(--rot,0deg))}50%{opacity:1;transform:scale(1.08) rotate(var(--rot,0deg))}}.compassDial{position:relative;width:120px;height:120px;border:1px solid rgba(255,255,255,.28);border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.12)}.compassDial:before{content:"";width:9px;height:9px;background:var(--yellow);border-radius:50%;box-shadow:0 0 16px rgba(255,200,0,.55)}.compassNeedle{position:absolute;width:45px;height:45px;transform:rotate(0deg)}.compassText{margin-top:12px;font-size:20px;font-weight:800;letter-spacing:.12em;color:#fff}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:24px 0 18px}.metric{text-align:center}.metricIcon{width:28px;height:28px;margin-bottom:12px}.metricLabel{color:var(--muted);font-size:15px;letter-spacing:.18em;text-transform:uppercase;font-weight:700}.metricValue{margin-top:12px;font-size:clamp(44px,5vw,72px);line-height:.92;font-weight:800;letter-spacing:-.03em}.metricUnit{margin-top:8px;color:#d7d7d7;font-size:clamp(18px,2.1vw,28px);font-weight:800}.status{position:absolute;left:38px;bottom:12px;color:rgba(255,255,255,.42);font-size:12px;letter-spacing:.05em}.noData{font-size:44px;color:var(--yellow);font-weight:800}.subtle{color:var(--muted);margin-top:10px}.settingsOverlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.72);display:none}.settingsOverlay.open{display:block}.settingsPanel{position:fixed;top:22px;right:22px;width:min(420px,calc(100vw - 44px));max-height:calc(100dvh - 44px);overflow:auto;z-index:10000;background:rgba(12,12,12,.96);border:1px solid rgba(255,200,0,.3);border-radius:24px;padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.7)}.settingsPanel h2{margin:0 0 18px;color:var(--yellow)}.field{margin:16px 0}.field label{display:block;color:#bbb;font-size:13px;text-transform:uppercase;letter-spacing:.14em;margin-bottom:7px}.field input,.field select{width:100%;background:#111;border:1px solid rgba(255,255,255,.18);border-radius:12px;color:#fff;padding:12px;font:inherit}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.toggleRow{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:14px 0;color:#eee}.closeBtn,.saveBtn{width:100%;border:0;border-radius:14px;padding:13px 16px;font-weight:800;cursor:pointer}.saveBtn{background:var(--yellow);color:#050505}.closeBtn{background:#222;color:#fff;margin-top:10px}.diagnostics{margin-top:22px;border-top:1px solid rgba(255,200,0,.22);padding-top:16px}.diagnostics h3{margin:0 0 10px;color:var(--yellow);font-size:14px;letter-spacing:.18em;text-transform:uppercase}.diagLine{display:flex;justify-content:space-between;gap:14px;font-size:13px;color:#bdbdbd;padding:4px 0}.diagLine b{color:#fff;font-weight:700;text-align:right}@media(max-width:740px){.app{padding:16px}.hero{grid-template-columns:1fr;gap:4px}.airlineBox{height:70px}.compassBox{height:150px}.metrics{gap:8px}.metricValue{font-size:24px}.metricIcon{width:22px}.compassDial{width:86px;height:86px}.topbar{font-size:14px}.brand{font-size:16px}.flightCode{font-size:64px}.status{left:16px}}
  </style>
</head>
<body>
<div class="app">
  <div id="bgPhoto" class="bgPhoto"></div><div class="overlay"></div>
  <main class="content">
    <header class="topbar">
      <div class="topLeft"><img class="smallIcon" src="/icons/clock.svg"><span id="clock">--:--</span></div>
      <div class="brand"><span>PLANE</span><b>PULSE</b></div>
      <div class="topRight"><img class="smallIcon" src="/icons/thermometer.svg"><span id="weather">--°C</span><span id="wind">-- km/h</span><button class="settingsBtn" id="openSettings"><img src="/icons/settings.svg" alt="Settings"></button></div>
    </header>
    <div class="rule"></div>
    <section class="hero" id="hero">
      <aside class="airlineBox"><img id="airlineLogo" class="airlineLogo" alt=""><div id="airlineFallback" class="airlineFallback"><div class="bubble">--</div><div class="name">AIRLINE</div></div></aside>
      <section class="centerStage">
        <div id="noData" style="display:none"><div class="noData">NO DATA</div><div class="subtle">No aircraft nearby</div></div>
        <div id="aircraftData">
          <div class="label">Flight</div>
          <div id="flightCode" class="flightCode">----</div>
          <img class="mainPlane" src="/icons/main_plane_icon.svg" alt="Aircraft">
          <div id="typeReg" class="typeReg">----</div>
          <div id="nextNearby" class="nextNearby"></div>
        </div>
      </section>
      <aside class="compassBox">
        <img id="climbArrow" class="climbArrow" src="/icons/arrow.svg" alt="Vertical trend">
        <div class="compassDial"><img id="compassNeedle" class="compassNeedle" src="/icons/compass_arrow.svg" alt="Direction"></div>
        <div id="compassText" class="compassText">---</div>
      </aside>
    </section>
    <div class="rule"></div>
    <section class="metrics">
      <div class="metric"><img class="metricIcon" src="/icons/ruler.svg"><div class="metricLabel">Distance</div><div id="distance" class="metricValue">--</div><div class="metricUnit">km</div></div>
      <div class="metric"><img class="metricIcon" src="/icons/altitude.svg"><div class="metricLabel">Altitude</div><div id="altitude" class="metricValue">--</div><div class="metricUnit">m</div></div>
      <div class="metric"><img class="metricIcon" src="/icons/speed.svg"><div class="metricLabel">Speed</div><div id="speed" class="metricValue">--</div><div class="metricUnit">km/h</div></div>
    </section>
    <div class="rule"></div>
    <div id="status" class="status">Starting…</div>
  </main>
</div>
<div id="settingsOverlay" class="settingsOverlay"><section class="settingsPanel">
  <h2>Settings</h2>
  <div class="field"><label>Location source</label><select id="locationSource"><option value="fixed">Fixed Location</option><option value="gps">Device GPS</option></select></div>
  <div class="row"><div class="field"><label>Latitude</label><input id="lat" type="number" step="0.000001"></div><div class="field"><label>Longitude</label><input id="lon" type="number" step="0.000001"></div></div>
  <div class="field"><label>Radius</label><select id="radius"><option value="25">25 km</option><option value="50">50 km</option><option value="100">100 km</option></select></div>
  <div class="field"><label>Display mode</label><select id="mode"><option value="closest">Closest Aircraft</option><option value="lowest">Lowest Aircraft</option><option value="audible">Most Audible Aircraft</option></select></div>
  <div class="field"><label>Refresh</label><select id="refresh"><option value="5000">5 sec</option><option value="10000">10 sec</option><option value="30000">30 sec</option></select></div>
  <label class="toggleRow"><span>Aircraft photo background <small style="color:#888">Planespotters</small></span><input id="photos" type="checkbox"></label>
  <div class="diagnostics"><h3>Diagnostics</h3><div class="diagLine"><span>Aircraft</span><b id="diagAircraft">--</b></div><div class="diagLine"><span>Registration</span><b id="diagReg">--</b></div><div class="diagLine"><span>ICAO24</span><b id="diagHex">--</b></div><div class="diagLine"><span>Airline</span><b id="diagAirline">--</b></div><div class="diagLine"><span>Logo</span><b id="diagLogo">--</b></div><div class="diagLine"><span>Photo</span><b id="diagPhoto">--</b></div></div>
  <button id="saveSettings" class="saveBtn">Save</button><button id="closeSettings" class="closeBtn">Close</button>
</section></div>
<script>
const $=id=>document.getElementById(id);const state={aircraft:[],lastFlight:null,timer:null,photoCache:{},logoCache:{},diag:{}};
const defaults={lat:60.2934,lon:25.0378,radius:50,refresh:10000,mode:'closest',locationSource:'fixed',photos:true};
function settings(){return {...defaults,...JSON.parse(localStorage.getItem('pp-settings')||'{}')}}function saveSettings(s){localStorage.setItem('pp-settings',JSON.stringify(s))}
function km(n){return isFinite(n)?`${Number(n).toFixed(Number(n)<10?1:0)} km`:'-- km'}function meters(n){return isFinite(n)?`${Math.round(n)} m`:'-- m'}function kmh(n){return isFinite(n)?`${Math.round(n)} km/h`:'-- km/h'}
function toRad(d){return d*Math.PI/180}function distKm(a,b,c,d){const R=6371;const x=toRad(c-a),y=toRad(d-b);const q=Math.sin(x/2)**2+Math.cos(toRad(a))*Math.cos(toRad(c))*Math.sin(y/2)**2;return 2*R*Math.asin(Math.sqrt(q))}
function bearing(a,b,c,d){const y=Math.sin(toRad(d-b))*Math.cos(toRad(c));const x=Math.cos(toRad(a))*Math.sin(toRad(c))-Math.sin(toRad(a))*Math.cos(toRad(c))*Math.cos(toRad(d-b));return (Math.atan2(y,x)*180/Math.PI+360)%360}
function dir(deg){const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];return dirs[Math.round(deg/22.5)%16]}
function norm(a,s){const lat=a.lat??a.latitude; const lon=a.lon??a.longitude; const altFt=a.alt_baro??a.alt_geom??a.baro_altitude; const gs=a.gs??a.velocity; const reg=a.r||a.reg||a.registration||''; return {raw:a,lat,lon,flight:(a.flight||a.callsign||a.call||a.hex||'').trim(),type:(a.t||a.type||a.aircraft_type||'').trim(),reg:reg.trim(),alt:typeof altFt==='number'?altFt*0.3048:NaN,speed:typeof gs==='number'?gs*1.852:NaN,track:a.track??a.true_track??0,vr:a.baro_rate??a.geom_rate??a.vertical_rate??0,hex:a.hex||a.icao24||'',airline:(a.flight||'').trim().slice(0,3).toUpperCase()}}
function score(a,mode){if(mode==='lowest')return a.alt||999999;if(mode==='audible')return (a.distance*1.8)+(Math.max(0,a.alt)/1000);return a.distance}
function airlineName(code){const map={FIN:'FINNAIR',RYR:'RYANAIR',DLH:'LUFTHANSA',SAS:'SAS',KLM:'KLM',AFR:'AIR FRANCE',BAW:'BRITISH AIRWAYS',NSZ:'NORSE',TAY:'ASL',PGT:'PEGASUS'};return map[(code||'').slice(0,3)]||((code||'AIRLINE').slice(0,3));}
const ICAO_TO_IATA={FIN:'AY',RYR:'FR',DLH:'LH',SAS:'SK',KLM:'KL',AFR:'AF',BAW:'BA',AAL:'AA',UAL:'UA',DAL:'DL',EZY:'U2',WZZ:'W6',THY:'TK',QTR:'QR',UAE:'EK',SWR:'LX',IBE:'IB',PGT:'PC',NAX:'DY',NSZ:'N0',TAY:'3V'};
function localLogoCandidates(code){
  const c=(code||'').replace(/[^A-Z0-9]/g,'').slice(0,3); if(!c)return [];
  const low=c.toLowerCase(); const iata=ICAO_TO_IATA[c];
  const base='https://raw.githubusercontent.com/Jxck-S/airline-logos/main';
  const urls=[
    `${base}/flightaware_logos/${c}.png`,`${base}/flightaware_logos/${low}.png`,
    `${base}/radarbox_logos/${c}.png`,`${base}/radarbox_logos/${low}.png`,
    `${base}/custom_logos/${c}.png`,`${base}/custom_logos/${low}.png`,
    `${base}/logos/${c}.png`,`${base}/logos/${low}.png`
  ];
  if(iata) urls.push(`https://images.kiwi.com/airlines/64x64/${iata}.png`);
  return urls;
}
function testImage(url){return new Promise(resolve=>{const img=new Image();img.onload=()=>resolve(url);img.onerror=()=>resolve('');img.src=url;});}
async function resolveLogo(code){
  const c=(code||'').replace(/[^A-Z0-9]/g,'').slice(0,3); if(!c)return '';
  if(state.logoCache[c]!==undefined)return state.logoCache[c];
  let candidates=localLogoCandidates(c);
  try{const r=await fetch(`/api/logo?code=${encodeURIComponent(c)}`); if(r.ok){const j=await r.json(); if(j.url)candidates=[j.url,...candidates]; if(Array.isArray(j.candidates))candidates=[...j.candidates,...candidates];}}catch(e){}
  candidates=[...new Set(candidates.filter(Boolean))];
  for(const url of candidates){const ok=await testImage(url); if(ok){state.logoCache[c]=ok; return ok;}}
  state.logoCache[c]=''; return '';
}
async function getPhoto(ac){const s=settings();if(!s.photos)return '';const key=ac.reg||ac.hex;if(!key)return '';if(state.photoCache[key]!==undefined)return state.photoCache[key];try{const r=await fetch(`/api/photo?reg=${encodeURIComponent(ac.reg||'')}&hex=${encodeURIComponent(ac.hex||'')}`);const j=await r.json();state.photoCache[key]=j.url||'';return state.photoCache[key]}catch(e){state.photoCache[key]='';return ''}}
function trend(ac){const v=Number(ac.vr)||0;if(v>128)return {rot:-45,pulse:true};if(v<-128)return {rot:45,pulse:true};return {rot:0,pulse:false}}
async function render(ac,next=[]){
  $('noData').style.display=ac?'none':'block';
  $('aircraftData').style.display=ac?'block':'none';
  if(!ac){$('status').textContent='No aircraft found';return}
  $('flightCode').textContent=ac.flight||ac.hex||'UNKNOWN';
  $('typeReg').textContent=[ac.type||'Aircraft',ac.reg].filter(Boolean).join(' • ');
  $('distance').textContent=isFinite(ac.distance)?(Number(ac.distance).toFixed(Number(ac.distance)<10?1:0)):'--';
  $('altitude').textContent=isFinite(ac.alt)?Math.round(ac.alt).toLocaleString('en-US'):'--';
  $('speed').textContent=isFinite(ac.speed)?Math.round(ac.speed):'--';
  $('compassText').textContent=dir(ac.bearing);
  $('compassNeedle').style.transform=`rotate(${ac.bearing||0}deg)`;
  const tr=trend(ac);
  $('climbArrow').style.setProperty('--rot',`${tr.rot}deg`);
  $('climbArrow').style.transform=`rotate(${tr.rot}deg)`;
  $('climbArrow').classList.toggle('pulse',tr.pulse);
  const nxt=next.slice(0,2).map(x=>`${x.flight||x.hex} ${x.distance.toFixed(1)} km`).join('  |  ');
  $('nextNearby').textContent=nxt;

  const code=(ac.airline||'AIR').slice(0,3);
  const showFallback=()=>{
    $('airlineLogo').style.display='none';
    $('airlineFallback').style.display='flex';
    $('airlineFallback').innerHTML=`<div class="bubble">${code.slice(0,2)||'--'}</div><div class="name">${airlineName(code)}</div>`;
  };
  const logo=await resolveLogo(code);
  if(logo){
    $('airlineFallback').style.display='none';
    $('airlineLogo').style.display='block';
    $('airlineLogo').onerror=showFallback;
    $('airlineLogo').src=logo;
  }else showFallback();

  const photo=await getPhoto(ac);
  if(photo){$('bgPhoto').style.backgroundImage=`url('${photo}')`;$('bgPhoto').classList.add('visible')}
  else{$('bgPhoto').classList.remove('visible')}

  state.diag={aircraft:ac.type||'--',reg:ac.reg||'--',hex:ac.hex||'--',airline:code,logo:logo?'FOUND':'NOT FOUND',photo:photo?'FOUND':'NOT FOUND'};
  updateDiagnostics();
  $('status').textContent=`Updated ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})}`
}
function updateDiagnostics(){
  const d=state.diag||{};
  const set=(id,val)=>{const el=$(id); if(el)el.textContent=val||'--'};
  set('diagAircraft',d.aircraft); set('diagReg',d.reg); set('diagHex',d.hex); set('diagAirline',d.airline); set('diagLogo',d.logo); set('diagPhoto',d.photo);
}
async function updateWeather(s){try{const r=await fetch(`/api/weather?lat=${s.lat}&lon=${s.lon}`);const j=await r.json();$('weather').textContent=isFinite(j.temperature)?`${Math.round(j.temperature)}°C`:'--°C';$('wind').textContent=isFinite(j.wind)?`${Math.round(j.wind)} km/h`:'-- km/h'}catch(e){}}
async function update(){const s=settings();let loc={lat:Number(s.lat),lon:Number(s.lon)};if(s.locationSource==='gps'&&navigator.geolocation){try{loc=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(p=>res({lat:p.coords.latitude,lon:p.coords.longitude}),rej,{enableHighAccuracy:true,timeout:5000,maximumAge:30000}))}catch(e){}}
 await updateWeather(loc);try{const nm=(Number(s.radius)||50)*0.539957;const r=await fetch(`/api/aircraft?lat=${loc.lat}&lon=${loc.lon}&dist=${nm.toFixed(1)}`);const j=await r.json();const list=(j.aircraft||j.ac||[]).map(x=>norm(x)).filter(x=>isFinite(x.lat)&&isFinite(x.lon)).map(x=>({...x,distance:distKm(loc.lat,loc.lon,x.lat,x.lon),bearing:bearing(loc.lat,loc.lon,x.lat,x.lon)})).sort((a,b)=>a.distance-b.distance);state.aircraft=list;const sorted=[...list].sort((a,b)=>score(a,s.mode)-score(b,s.mode));render(sorted[0],list.filter(x=>x!==sorted[0]).slice(0,2))}catch(e){$('status').textContent='Data error';render(null)}}
function start(){clearInterval(state.timer);update();state.timer=setInterval(update,Number(settings().refresh)||10000)}
function tickClock(){$('clock').textContent=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}setInterval(tickClock,1000);tickClock();
function loadSettings(){const s=settings();['lat','lon','radius','refresh','mode','locationSource'].forEach(id=>$(id).value=s[id]);$('photos').checked=!!s.photos}
$('openSettings').onclick=()=>{loadSettings();$('settingsOverlay').classList.add('open')};$('closeSettings').onclick=()=>$('settingsOverlay').classList.remove('open');$('settingsOverlay').addEventListener('click',e=>{if(e.target.id==='settingsOverlay')$('settingsOverlay').classList.remove('open')});$('saveSettings').onclick=()=>{saveSettings({lat:Number($('lat').value),lon:Number($('lon').value),radius:Number($('radius').value),refresh:Number($('refresh').value),mode:$('mode').value,locationSource:$('locationSource').value,photos:$('photos').checked});$('settingsOverlay').classList.remove('open');start()};
if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});start();
</script></body></html>
