<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FFC800" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="PlanePulse" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>PlanePulse</title>
  <style>
    :root{--yellow:#FFC800;--bg:#0f0f0f;--text:#fff;--muted:#8d9098;--line:rgba(255,200,0,.38);--glass:rgba(0,0,0,.5)}
    *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;background:#0f0f0f;color:var(--text);font-family:"Stack Sans Text",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}
    body{letter-spacing:.01em}.bg{position:fixed;inset:0;background:radial-gradient(circle at 50% 15%, rgba(255,200,0,.10), transparent 36%),linear-gradient(135deg,#131417,#060606);background-size:cover;background-position:center;transition:background-image .2s linear}.shade{position:fixed;inset:0;background:rgba(0,0,0,.50)}
    .app{position:relative;z-index:2;width:100vw;height:100vh;padding:26px 38px 20px;display:grid;grid-template-rows:72px 1fr 196px;gap:0}.top{border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr auto 1fr;align-items:start}.time,.weather{display:flex;align-items:center;gap:12px;font-size:38px;font-weight:800;line-height:1;color:#fff}.brand{align-self:start;font-size:22px;font-weight:800;letter-spacing:.46em;margin-top:7px;color:#d7d7d7}.brand span{color:var(--yellow)}.weather{justify-content:flex-end}.weather small{font-size:22px;color:var(--muted);margin-left:10px}.gear{width:48px;height:48px;border:1px solid rgba(255,200,0,.38);border-radius:999px;background:rgba(0,0,0,.18);color:var(--yellow);display:grid;place-items:center;margin-left:18px;cursor:pointer}.gear svg,.topIcon{width:22px;height:22px;stroke:var(--yellow)}
    .hero{min-height:0;display:grid;grid-template-columns:270px 1fr 270px;align-items:center;border-bottom:1px solid var(--line)}.side{height:68%;display:flex;align-items:center;justify-content:center}.left{border-right:1px solid rgba(255,255,255,.15);flex-direction:column;gap:22px}.right{border-left:1px solid rgba(255,255,255,.15);flex-direction:column;gap:20px}.airlineBadge{width:112px;height:112px;border-radius:50%;background:var(--yellow);color:#070707;display:grid;place-items:center;font-size:34px;font-weight:900;box-shadow:0 0 42px rgba(255,200,0,.18)}.airlineName{font-size:30px;font-weight:900}.center{min-width:0;text-align:center;align-self:center}.flight{font-size:132px;line-height:.88;font-weight:900;letter-spacing:-.055em;color:var(--yellow);text-shadow:0 0 46px rgba(255,200,0,.26);white-space:nowrap}.planeIcon{width:112px;height:112px;margin:28px auto 14px;color:#fff}.typeLine{font-size:30px;font-weight:900;letter-spacing:.16em;color:#d9dce2}.nextLine{margin-top:16px;font-size:17px;font-weight:800;color:#9b9ea7;letter-spacing:.04em;text-transform:uppercase}.nextLine .sep{color:var(--yellow);opacity:.55;padding:0 10px}.climbArrow{font-size:44px;color:var(--yellow);line-height:1;min-height:48px;text-shadow:0 0 20px rgba(255,200,0,.3)}.pulse{animation:pulse 1.8s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.72;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}.compass{width:142px;height:142px;border:1px solid rgba(255,255,255,.23);border-radius:50%;position:relative;display:grid;place-items:center;background:rgba(0,0,0,.22)}.compass b{position:absolute;color:#e9e9e9;font-size:16px}.n{top:14px}.s{bottom:14px}.w{left:16px}.e{right:16px}.compassArrow{width:52px;height:52px;transform-origin:center;color:var(--yellow)}.dir{font-size:27px;font-weight:900;color:var(--yellow);letter-spacing:.08em;margin-top:-4px}.metrics{display:grid;grid-template-columns:1fr 1fr 1fr;align-items:center;text-align:center;border-bottom:1px solid var(--line)}.metric{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px}.metric+.metric{border-left:1px solid rgba(255,255,255,.12)}.metricIcon{width:28px;height:28px;stroke:var(--yellow);color:var(--yellow);fill:none}.metricLabel{font-size:17px;text-transform:uppercase;letter-spacing:.24em;color:#9da0a8;font-weight:900}.metricValue{font-size:58px;line-height:.95;font-weight:900;color:#fff}.metricValue span{font-size:27px;color:#c7c9cf;margin-left:8px;letter-spacing:0}.status{position:absolute;left:38px;bottom:9px;color:#8f9299;font-size:13px;letter-spacing:.12em;text-transform:uppercase}.dot{display:inline-block;width:9px;height:9px;background:var(--yellow);border-radius:50%;margin-right:9px}.settingsOverlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.72);display:none}.settingsOverlay.open{display:block}.settingsPanel{position:fixed;right:24px;top:24px;width:min(440px,calc(100vw - 48px));max-height:calc(100vh - 48px);overflow:auto;background:#101113;border:1px solid rgba(255,200,0,.32);border-radius:22px;padding:24px;box-shadow:0 30px 90px rgba(0,0,0,.65);z-index:10000}.settingsPanel h2{margin:0 0 18px;color:var(--yellow)}.settingsPanel label{display:block;margin:14px 0 6px;color:#b9bcc4;font-weight:800;text-transform:uppercase;font-size:12px;letter-spacing:.18em}.settingsPanel input,.settingsPanel select{width:100%;padding:12px 14px;background:#080808;border:1px solid rgba(255,255,255,.18);border-radius:12px;color:#fff;font:inherit}.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.toggleRow{display:flex;align-items:center;gap:10px;margin:12px 0;color:#fff}.buttons{display:flex;gap:12px;margin-top:20px}.btn{border:1px solid rgba(255,200,0,.38);background:var(--yellow);color:#111;padding:12px 16px;border-radius:14px;font-weight:900;cursor:pointer}.btn.secondary{background:transparent;color:#fff}.noData{font-size:42px;color:var(--yellow);font-weight:900}.hint{color:#9b9ea7;margin-top:12px}
    @media(max-width:900px){.app{padding:20px;grid-template-rows:62px 1fr 176px}.hero{grid-template-columns:160px 1fr 160px}.flight{font-size:82px}.airlineBadge{width:76px;height:76px;font-size:24px}.airlineName{font-size:20px}.compass{width:104px;height:104px}.planeIcon{width:76px;height:76px}.metricValue{font-size:42px}.typeLine{font-size:22px}.brand{font-size:16px}.time,.weather{font-size:28px}}
  </style>
</head>
<body>
  <div id="bg" class="bg"></div><div class="shade"></div>
  <main class="app">
    <section class="top">
      <div class="time"><svg class="topIcon" viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v6l4 2"/></svg><span id="clock">--:--</span></div>
      <div class="brand">PLANE<span>PULSE</span></div>
      <div class="weather"><svg class="topIcon" viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M14 14.76V5a4 4 0 0 0-8 0v9.76A6 6 0 1 0 14 14.76z"/><path d="M10 5v10"/></svg><span id="temp">--°C</span><small id="wind">-- km/h</small><button class="gear" id="settingsBtn" aria-label="Settings"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5z"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.88l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .6 1.7 1.7 0 0 0-.4 1.1V21a2 2 0 1 1-4 0v-.09A1.7 1.7 0 0 0 8.6 19.4a1.7 1.7 0 0 0-1.88.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.6-1 1.7 1.7 0 0 0-1.1-.4H3a2 2 0 1 1 0-4h.09A1.7 1.7 0 0 0 4.6 8.6a1.7 1.7 0 0 0-.34-1.88l-.06-.06A2 2 0 1 1 7.03 3.83l.06.06A1.7 1.7 0 0 0 9 4.6c.38-.16.7-.37 1-.6.3-.3.4-.7.4-1.1V3a2 2 0 1 1 4 0v.09c0 .42.14.8.4 1.1.3.23.62.44 1 .6a1.7 1.7 0 0 0 1.88-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.16.38.37.7.6 1 .3.3.7.4 1.1.4H21a2 2 0 1 1 0 4h-.09c-.42 0-.8.14-1.1.4-.23.3-.44.62-.6 1z"/></svg></button></div>
    </section>
    <section class="hero">
      <div class="side left"><div id="airlineBadge" class="airlineBadge">--</div><div id="airlineName" class="airlineName">AIRLINE</div></div>
      <div class="center" id="centerContent"><div class="noData">Loading…</div><div class="hint">Fetching nearby aircraft</div></div>
      <div class="side right"><div id="climbArrow" class="climbArrow">→</div><div class="compass"><b class="n">N</b><b class="e">E</b><b class="s">S</b><b class="w">W</b><svg id="compassArrow" class="compassArrow" viewBox="0 0 64 64"><path d="M48 8 26 58 22 36 6 28z" fill="currentColor"/></svg></div><div id="dir" class="dir">--</div></div>
    </section>
    <section class="metrics">
      <div class="metric"><svg class="metricIcon" viewBox="0 0 24 24" stroke-width="2"><path d="M3 12h18"/><path d="M6 9l-3 3 3 3"/><path d="M18 9l3 3-3 3"/></svg><div class="metricValue"><span id="dist">--</span><span>km</span></div><div class="metricLabel">Distance</div></div>
      <div class="metric"><svg class="metricIcon" viewBox="0 0 24 24" stroke-width="2"><path d="M4 18 10 6l4 8 3-5 3 9z"/></svg><div class="metricValue"><span id="alt">--</span><span>m</span></div><div class="metricLabel">Altitude</div></div>
      <div class="metric"><svg class="metricIcon" viewBox="0 0 24 24" stroke-width="2"><path d="M5 17a8 8 0 1 1 14 0"/><path d="m12 17 4-7"/></svg><div class="metricValue"><span id="speed">--</span><span>km/h</span></div><div class="metricLabel">Speed</div></div>
    </section>
    <div class="status"><span class="dot"></span><span id="status">Live ADS-B data</span></div>
  </main>
  <div id="settingsOverlay" class="settingsOverlay"><div class="settingsPanel"><h2>Settings</h2><label>Location source</label><select id="locationMode"><option value="fixed">Fixed location</option><option value="gps">Device GPS</option></select><div class="row2"><div><label>Latitude</label><input id="lat" type="number" step="0.000001"></div><div><label>Longitude</label><input id="lon" type="number" step="0.000001"></div></div><div class="row2"><div><label>Radius km</label><input id="radius" type="number" min="5" max="250"></div><div><label>Refresh sec</label><input id="refresh" type="number" min="5" max="60"></div></div><label>Display mode</label><select id="mode"><option value="closest">Closest aircraft</option><option value="lowest">Lowest aircraft</option><option value="audible">Most audible aircraft</option></select><div class="toggleRow"><input id="photos" type="checkbox"><span>Aircraft photo background experimental</span></div><div class="buttons"><button id="saveSettings" class="btn">Save</button><button id="closeSettings" class="btn secondary">Close</button></div></div></div>
<script>
const $=id=>document.getElementById(id);const DEG=Math.PI/180;const settings={lat:60.293,lon:25.037,radius:50,refresh:10,mode:'closest',locationMode:'fixed',photos:true,...JSON.parse(localStorage.getItem('ppSettings')||'{}')};let lastReg='';
function save(){localStorage.setItem('ppSettings',JSON.stringify(settings))}function clock(){const d=new Date();$('clock').textContent=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}).replace('.',':')}setInterval(clock,1000);clock();
function hav(a,b,c,d){const R=6371,dl=(c-a)*DEG,do_=(d-b)*DEG,x=Math.sin(dl/2)**2+Math.cos(a*DEG)*Math.cos(c*DEG)*Math.sin(do_/2)**2;return 2*R*Math.asin(Math.sqrt(x))}function bearing(a,b,c,d){const y=Math.sin((d-b)*DEG)*Math.cos(c*DEG),x=Math.cos(a*DEG)*Math.sin(c*DEG)-Math.sin(a*DEG)*Math.cos(c*DEG)*Math.cos((d-b)*DEG);return (Math.atan2(y,x)/DEG+360)%360}function dirName(deg){return ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'][Math.round(deg/22.5)%16]}function num(v){const n=Number(v);return Number.isFinite(n)?n:null}function fmt(n,d=0){return n==null?'--':n.toLocaleString('en-US',{maximumFractionDigits:d,minimumFractionDigits:d})}function airlineCode(c){return String(c||'--').trim().slice(0,3).replace(/[^A-Z0-9]/g,'')||'--'}function airlineName(c){const a=String(c||'').slice(0,3).toUpperCase();return ({FIN:'FINNAIR',TAY:'TAY',RYR:'RYANAIR',SAS:'SAS',DLH:'LUFTHANSA',KLM:'KLM',BAW:'BRITISH AIRWAYS',NAX:'NORWEGIAN'}[a]||a||'AIRLINE')}function aircraftId(ac){return (ac.flight||ac.callsign||ac.call||ac.r||ac.hex||'UNKNOWN').trim()}function reg(ac){return (ac.r||ac.reg||ac.registration||'').trim().toUpperCase()}function type(ac){return (ac.t||ac.type||ac.icao_type||ac.desc||'AIRCRAFT').trim()}function altitude(ac){let v=num(ac.alt_baro); if(v==null)v=num(ac.alt_geom); if(v==null)return null; return Math.round(v*0.3048)}function speed(ac){let v=num(ac.gs); return v==null?null:Math.round(v*1.852)}function vert(ac){let v=num(ac.baro_rate); if(v==null)v=num(ac.geom_rate); return v}function choose(list){const valid=list.map(ac=>{const lat=num(ac.lat),lon=num(ac.lon);if(lat==null||lon==null)return null;const distance=hav(settings.lat,settings.lon,lat,lon);const brg=bearing(settings.lat,settings.lon,lat,lon);const alt=altitude(ac);const sp=speed(ac);const v=vert(ac);return {...ac,_distance:distance,_bearing:brg,_alt:alt,_speed:sp,_vert:v}}).filter(Boolean);if(!valid.length)return {main:null,next:[]};let sorted=[...valid].sort((a,b)=>a._distance-b._distance);let main=sorted[0];if(settings.mode==='lowest')main=[...valid].filter(a=>a._alt!=null).sort((a,b)=>a._alt-b._alt)[0]||main;if(settings.mode==='audible')main=[...valid].sort((a,b)=>(a._distance+(a._alt||10000)/1200)-(b._distance+(b._alt||10000)/1200))[0]||main;return {main,next:sorted.filter(a=>aircraftId(a)!==aircraftId(main)).slice(0,2)}}
async function updateWeather(){try{const r=await fetch(`/api/weather?lat=${settings.lat}&lon=${settings.lon}`);const w=await r.json();$('temp').textContent=w.temperature==null?'--°C':`${Math.round(w.temperature)}°C`;$('wind').textContent=w.wind==null?'-- km/h':`${Math.round(w.wind)} km/h`}catch{}}
async function updatePhoto(rg){if(!settings.photos||!rg||rg===lastReg)return;lastReg=rg;try{const r=await fetch(`/api/photo?reg=${encodeURIComponent(rg)}`);const p=await r.json();if(p.photo){$('bg').style.backgroundImage=`url('${p.photo}')`}else{$('bg').style.backgroundImage=''}}catch{$('bg').style.backgroundImage=''}}
function render(main,next){if(!main){$('centerContent').innerHTML='<div class="noData">No data</div><div class="hint">No nearby aircraft found</div>';return}const id=aircraftId(main),rg=reg(main),tp=type(main),code=airlineCode(id),name=airlineName(id),typeReg=rg?`${tp} • ${rg}`:tp; $('airlineBadge').textContent=code;$('airlineName').textContent=name;const nextText=next.map(a=>`${aircraftId(a)} ${fmt(a._distance,1)} km`).join('<span class="sep">|</span>')||'&nbsp;';$('centerContent').innerHTML=`<div class="flight">${id}</div><svg class="planeIcon" viewBox="0 0 128 128" fill="none" stroke="currentColor" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"><path d="M66 15c7 0 11 6 11 15v29l39 25c5 3 7 9 5 14-2 5-8 7-14 5L77 94v17l12 9c4 3 5 7 3 10-2 3-6 4-10 2l-16-6-16 6c-4 2-8 1-10-2-2-3-1-7 3-10l12-9V94l-30 9c-6 2-12 0-14-5-2-5 0-11 5-14l39-25V30c0-9 4-15 11-15Z"/></svg><div class="typeLine">${typeReg}</div><div class="nextLine">${nextText}</div>`;$('dist').textContent=fmt(main._distance,1);$('alt').textContent=fmt(main._alt,0);$('speed').textContent=fmt(main._speed,0);const brg=main._bearing||0;$('dir').textContent=dirName(brg);$('compassArrow').style.transform=`rotate(${brg}deg)`;const v=main._vert||0;let arrow='→';if(v>128)arrow='↗';else if(v<-128)arrow='↘';$('climbArrow').textContent=arrow;$('climbArrow').classList.toggle('pulse',arrow!=='→');$('status').textContent=`Updated ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;updatePhoto(rg)}
async function tick(){if(settings.locationMode==='gps'&&navigator.geolocation){navigator.geolocation.getCurrentPosition(pos=>{settings.lat=pos.coords.latitude;settings.lon=pos.coords.longitude;$('lat').value=settings.lat.toFixed(6);$('lon').value=settings.lon.toFixed(6);save();loadAircraft();},()=>loadAircraft(),{enableHighAccuracy:true,timeout:5000,maximumAge:30000})}else loadAircraft()}async function loadAircraft(){try{const r=await fetch(`/api/aircraft?lat=${settings.lat}&lon=${settings.lon}&km=${settings.radius}`);const data=await r.json();const {main,next}=choose(data.aircraft||[]);render(main,next)}catch(e){render(null,[])}}
function initSettings(){['lat','lon','radius','refresh','mode','locationMode'].forEach(k=>{if($(k))$(k).value=settings[k]});$('photos').checked=!!settings.photos;$('settingsBtn').onclick=()=>$('settingsOverlay').classList.add('open');$('closeSettings').onclick=()=>$('settingsOverlay').classList.remove('open');$('settingsOverlay').onclick=e=>{if(e.target.id==='settingsOverlay')$('settingsOverlay').classList.remove('open')};$('saveSettings').onclick=()=>{settings.lat=parseFloat($('lat').value)||settings.lat;settings.lon=parseFloat($('lon').value)||settings.lon;settings.radius=parseFloat($('radius').value)||50;settings.refresh=parseFloat($('refresh').value)||10;settings.mode=$('mode').value;settings.locationMode=$('locationMode').value;settings.photos=$('photos').checked;save();$('settingsOverlay').classList.remove('open');updateWeather();tick();restart()}}
let timer;function restart(){clearInterval(timer);timer=setInterval(tick,Math.max(5,settings.refresh)*1000)}initSettings();updateWeather();tick();restart();setInterval(updateWeather,60000);if('serviceWorker'in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{})}
</script>
</body>
</html>
