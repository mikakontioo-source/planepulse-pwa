<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>PlanePulse</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#FFC800" />
  <style>
    :root{--yellow:#FFC800;--bg:#0b0b0c;--text:#fff;--muted:#8a8a8a;--line:rgba(255,200,0,.32)}
    *{box-sizing:border-box} html,body{margin:0;width:100%;height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;overflow:hidden}
    body{letter-spacing:.02em}.photoBg{position:fixed;inset:0;background-size:cover;background-position:center;opacity:1;transition:background-image .2s ease}.photoOverlay{position:fixed;inset:0;background:rgba(0,0,0,.5)}
    .app{position:relative;z-index:1;min-height:100vh;padding:clamp(18px,3vw,34px);display:flex;flex-direction:column;gap:18px;background:radial-gradient(circle at 50% 20%,rgba(255,200,0,.06),transparent 34%)}
    .top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;font-size:clamp(18px,2vw,26px);font-weight:500;color:#eee}.brand{font-weight:700;letter-spacing:.32em;color:var(--yellow);font-size:clamp(16px,1.8vw,22px)}.weather{text-align:right;display:flex;align-items:center;justify-content:flex-end;gap:18px}.settingsBtn{border:0;background:transparent;color:var(--yellow);font-size:28px;cursor:pointer;margin-left:10px}.line{height:1px;background:var(--line);width:100%}
    .hero{display:grid;grid-template-columns:24% 52% 24%;align-items:center;flex:1;min-height:0}.leftPanel{display:flex;justify-content:center;align-items:center}.airlineLogo{width:min(180px,16vw);aspect-ratio:1.8/1;border:1px solid var(--line);border-radius:18px;display:flex;align-items:center;justify-content:center;color:var(--yellow);font-weight:800;font-size:clamp(18px,2.3vw,36px);background:rgba(0,0,0,.22);backdrop-filter:blur(4px)}
    .center{text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}.flightLabel{display:none}.callsign{font-size:clamp(54px,9vw,132px);font-weight:800;color:var(--yellow);line-height:.92;letter-spacing:.04em;text-shadow:0 0 24px rgba(255,200,0,.14)}.planeIcon{width:clamp(74px,9vw,130px);height:clamp(74px,9vw,130px);color:var(--yellow);filter:drop-shadow(0 0 16px rgba(255,200,0,.18))}.typeReg{font-size:clamp(22px,3vw,44px);font-weight:600}.nextNearby{font-size:clamp(14px,1.35vw,24px);color:var(--muted);min-height:1.3em;white-space:nowrap}.rightPanel{display:flex;justify-content:center;align-items:center}.compassBlock{display:flex;flex-direction:column;align-items:center;gap:18px;transform:translateY(12px)}.verticalArrow{font-size:clamp(28px,3.2vw,48px);color:var(--yellow);line-height:1}.verticalArrow.pulse{animation:pulse 1.8s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.58;transform:scale(.96)}50%{opacity:1;transform:scale(1.08)}}
    .compass{width:clamp(115px,12vw,190px);height:clamp(115px,12vw,190px);border:1px solid var(--line);border-radius:50%;position:relative;background:rgba(0,0,0,.20);backdrop-filter:blur(4px)}.compass .n,.compass .s,.compass .w,.compass .e{position:absolute;color:rgba(255,255,255,.58);font-size:clamp(11px,1vw,16px);font-weight:700}.compass .n{top:9px;left:50%;transform:translateX(-50%)}.compass .s{bottom:9px;left:50%;transform:translateX(-50%)}.compass .w{left:12px;top:50%;transform:translateY(-50%)}.compass .e{right:12px;top:50%;transform:translateY(-50%)}.compassArrow{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--yellow);font-size:clamp(34px,4vw,62px);transition:transform .2s ease}.dirText{position:absolute;bottom:-32px;left:50%;transform:translateX(-50%);color:#fff;font-size:clamp(15px,1.4vw,22px);font-weight:600;white-space:nowrap}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;text-align:center;padding:20px 0 18px}.metricVal{font-size:clamp(30px,4.3vw,68px);font-weight:750;color:#fff;line-height:1}.metricLabel{margin-top:8px;color:var(--muted);font-size:clamp(14px,1.4vw,22px);text-transform:uppercase;letter-spacing:.12em}.sub{display:flex;justify-content:space-between;color:rgba(255,255,255,.45);font-size:13px;min-height:18px}.noData{position:fixed;inset:0;z-index:2;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.74);font-size:34px;color:var(--yellow);font-weight:700}.noData.show{display:flex}
    .settingsOverlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.74);display:none}.settingsOverlay.show{display:block}.settingsPanel{position:fixed;right:24px;top:24px;z-index:10000;width:min(430px,calc(100vw - 48px));max-height:calc(100vh - 48px);overflow:auto;background:rgba(13,13,14,.96);border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:0 20px 80px rgba(0,0,0,.55)}.settingsPanel h2{margin:0 0 22px;color:var(--yellow);letter-spacing:.08em}.field{margin:18px 0}.field label{display:block;color:var(--muted);font-size:13px;text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}.field input,.field select{width:100%;background:#080808;color:#fff;border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:12px;font-size:16px}.radioRow{display:flex;gap:14px;flex-wrap:wrap}.radioRow label{color:#fff;text-transform:none;letter-spacing:0;display:flex;align-items:center;gap:6px;margin:0}.actions{display:flex;justify-content:flex-end;gap:12px;margin-top:24px}.btn{background:transparent;border:1px solid var(--line);color:#fff;border-radius:12px;padding:11px 16px;cursor:pointer}.btn.primary{background:var(--yellow);color:#111;border-color:var(--yellow);font-weight:800}.gpsStatus{color:var(--muted);font-size:13px;line-height:1.5}
    @media(max-width:760px){.hero{grid-template-columns:1fr;gap:14px}.leftPanel{order:1}.center{order:2}.rightPanel{order:3}.airlineLogo{width:130px}.compass{width:120px;height:120px}.metrics{gap:8px}.nextNearby{white-space:normal}.top{font-size:16px}.brand{letter-spacing:.18em}}
  </style>
</head>
<body>
  <div class="photoBg" id="photoBg"></div><div class="photoOverlay"></div>
  <main class="app">
    <header class="top"><div id="clock">--:--</div><div class="brand">PLANE PULSE</div><div class="weather"><span id="weatherText">--°C&nbsp;&nbsp;-- m/s</span><button class="settingsBtn" id="openSettings" aria-label="Settings">⚙</button></div></header>
    <div class="line"></div>
    <section class="hero">
      <aside class="leftPanel"><div class="airlineLogo" id="airlineLogo">--</div></aside>
      <section class="center">
        <div class="callsign" id="callsign">----</div>
        <svg class="planeIcon" viewBox="0 0 100 100" aria-hidden="true"><path fill="currentColor" d="M48 7c2-3 6-3 8 0 1 2 2 8 2 15v17l30 16c3 2 5 5 5 9v6L58 59v19l11 9v6L52 88l-17 5v-6l11-9V59L11 70v-6c0-4 2-7 5-9l30-16V22c0-7 1-13 2-15z"/></svg>
        <div class="typeReg" id="typeReg">AIRCRAFT TYPE</div>
        <div class="nextNearby" id="nextNearby">-- km | -- km</div>
      </section>
      <aside class="rightPanel"><div class="compassBlock"><div class="verticalArrow" id="verticalArrow">→</div><div class="compass"><span class="n">N</span><span class="s">S</span><span class="w">W</span><span class="e">E</span><div class="compassArrow" id="compassArrow">↑</div><div class="dirText" id="dirText">--</div></div></div></aside>
    </section>
    <div class="line"></div>
    <section class="metrics"><div><div class="metricVal" id="distance">--</div><div class="metricLabel">Distance</div></div><div><div class="metricVal" id="altitude">--</div><div class="metricLabel">Altitude</div></div><div><div class="metricVal" id="speed">--</div><div class="metricLabel">Speed</div></div></section>
    <div class="line"></div><div class="sub"><span>LIVE ADS-B DATA</span><span id="updated">UPDATED --</span></div>
  </main>
  <div class="noData" id="noData">NO DATA</div>
  <div class="settingsOverlay" id="settingsOverlay"><section class="settingsPanel"><h2>Settings</h2><div class="field"><label>Location source</label><div class="radioRow"><label><input type="radio" name="locSource" value="fixed"> Fixed location</label><label><input type="radio" name="locSource" value="gps"> Device GPS</label></div></div><div class="field"><label>Latitude</label><input id="latInput" type="number" step="0.000001"></div><div class="field"><label>Longitude</label><input id="lonInput" type="number" step="0.000001"></div><div class="field"><label>Radius km</label><input id="radiusInput" type="number" min="5" max="200"></div><div class="field"><label>Display mode</label><select id="modeInput"><option value="closest">Closest aircraft</option><option value="lowest">Lowest aircraft</option><option value="audible">Most audible aircraft</option></select></div><div class="field"><label>Aircraft photo background</label><div class="radioRow"><label><input type="radio" name="photoBg" value="on"> On</label><label><input type="radio" name="photoBg" value="off"> Off</label></div></div><div class="field"><label>GPS status</label><div class="gpsStatus" id="gpsStatus">Using fixed location</div></div><div class="actions"><button class="btn" id="cancelSettings">Cancel</button><button class="btn primary" id="saveSettings">Save</button></div></section></div>
  <script>
    const $=id=>document.getElementById(id); const K='planepulse-settings-v15';
    let settings={lat:60.293,lon:25.037,radius:50,mode:'closest',locSource:'fixed',photoBg:'on'}; try{settings={...settings,...JSON.parse(localStorage.getItem(K)||'{}')}}catch(e){}
    let lastAircraft=null,lastPhotoKey=null; const fmt=n=>Number.isFinite(n)?n.toLocaleString('en-US',{maximumFractionDigits:1}):'--';
    function kmToNm(km){return km*0.539957} function rad(d){return d*Math.PI/180} function deg(r){return (r*180/Math.PI+360)%360}
    function distanceKm(a,b,c,d){const R=6371,x=rad(c-a),y=rad(d-b),s=Math.sin(x/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(y/2)**2;return 2*R*Math.asin(Math.sqrt(s))}
    function bearing(a,b,c,d){const y=Math.sin(rad(d-b))*Math.cos(rad(c));const x=Math.cos(rad(a))*Math.sin(rad(c))-Math.sin(rad(a))*Math.cos(rad(c))*Math.cos(rad(d-b));return deg(Math.atan2(y,x))}
    function dirName(b){const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];return dirs[Math.round(b/22.5)%16]}
    function airlineCode(cs){return (cs||'').trim().replace(/[^A-Z0-9]/gi,'').slice(0,3).toUpperCase()||'--'}
    function normalize(a){return {raw:a,hex:a.hex||a.icao24,call:(a.flight||a.call||a.callsign||a.r||'').trim(),reg:(a.r||a.reg||a.registration||'').trim(),type:(a.t||a.type||a.aircraft_type||a.icaoType||'').trim(),lat:+(a.lat??a.latitude),lon:+(a.lon??a.longitude),alt:+(a.alt_baro??a.alt_geom??a.altitude??0),gs:+(a.gs??a.speed??0),track:+(a.track??a.trak??a.heading??0),baroRate:+(a.baro_rate??a.vert_rate??a.vertical_rate??0)}}
    function score(a){if(settings.mode==='lowest')return a.alt||999999;if(settings.mode==='audible')return (a.dist*1.25)+(Math.max(0,a.altM)/1000)*2;return a.dist}
    function choose(list){const clean=list.map(normalize).filter(a=>Number.isFinite(a.lat)&&Number.isFinite(a.lon)).map(a=>({...a,dist:distanceKm(settings.lat,settings.lon,a.lat,a.lon),bear:bearing(settings.lat,settings.lon,a.lat,a.lon),altM:a.alt?Math.round(a.alt*0.3048):0,speedKmh:a.gs?Math.round(a.gs*1.852):0})).filter(a=>a.dist<=settings.radius);clean.sort((a,b)=>score(a)-score(b));return clean}
    async function fetchJson(url){const r=await fetch(url,{cache:'no-store'});if(!r.ok)throw new Error(url);return r.json()}
    async function loadAircraft(){try{const data=await fetchJson(`/api/aircraft?lat=${settings.lat}&lon=${settings.lon}&dist=${Math.round(kmToNm(settings.radius))}`);const arr=data.aircraft||data.ac||[];const list=choose(arr);if(!list.length){$('noData').classList.add('show');return}$('noData').classList.remove('show');render(list[0],list.slice(1,3));}catch(e){console.error(e);$('noData').classList.add('show')}}
    async function loadWeather(){try{const w=await fetchJson(`/api/weather?lat=${settings.lat}&lon=${settings.lon}`);const cur=w.current||w.current_weather||{};const temp=cur.temperature_2m??cur.temperature;const wind=cur.wind_speed_10m??cur.windspeed;$('weatherText').innerHTML=`${fmt(temp)}°C&nbsp;&nbsp;${fmt(wind)} m/s`;}catch(e){}}
    async function loadPhoto(a){if(settings.photoBg!=='on'||!a.reg){$('photoBg').style.backgroundImage='';return} const key=a.reg;if(key===lastPhotoKey)return;lastPhotoKey=key;try{const p=await fetchJson(`/api/photo?reg=${encodeURIComponent(a.reg)}`);if(p&&p.url)$('photoBg').style.backgroundImage=`url('${p.url}')`;else $('photoBg').style.backgroundImage='';}catch(e){$('photoBg').style.backgroundImage=''}}
    function verticalIcon(rate){if(rate>150)return '↗'; if(rate<-150)return '↘'; return '→'}
    function render(a,next){lastAircraft=a;$('airlineLogo').textContent=airlineCode(a.call||a.reg);$('callsign').textContent=a.call||a.reg||a.hex||'----';$('typeReg').textContent=[a.type||'Aircraft',a.reg].filter(Boolean).join(' • ');$('nextNearby').textContent=next.map(n=>`${n.call||n.reg||n.hex||'----'} ${fmt(n.dist)} km`).join('  |  ')||'';$('distance').textContent=`${fmt(a.dist)} km`;$('altitude').textContent=`${Math.round(a.altM||0).toLocaleString('en-US')} m`;$('speed').textContent=`${Math.round(a.speedKmh||0).toLocaleString('en-US')} km/h`;$('compassArrow').style.transform=`rotate(${a.bear}deg)`;$('dirText').textContent=dirName(a.bear);const vi=verticalIcon(a.baroRate);$('verticalArrow').textContent=vi;$('verticalArrow').classList.toggle('pulse',vi!=='→');$('updated').textContent=`UPDATED ${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})}`;loadPhoto(a)}
    function tickClock(){$('clock').textContent=new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
    function getGps(){return new Promise((resolve,reject)=>{if(!navigator.geolocation)return reject(new Error('Geolocation not available'));navigator.geolocation.getCurrentPosition(p=>resolve(p),reject,{enableHighAccuracy:true,timeout:10000,maximumAge:60000})})}
    async function applyGps(){if(settings.locSource!=='gps'){$('gpsStatus').textContent='Using fixed location';return} try{const p=await getGps();settings.lat=p.coords.latitude;settings.lon=p.coords.longitude;$('gpsStatus').textContent=`Using device GPS, accuracy ±${Math.round(p.coords.accuracy)} m`;localStorage.setItem(K,JSON.stringify(settings));}catch(e){$('gpsStatus').textContent='GPS not available, using saved location'}}
    function openSettings(){document.querySelector(`input[name="locSource"][value="${settings.locSource}"]`).checked=true;document.querySelector(`input[name="photoBg"][value="${settings.photoBg}"]`).checked=true;$('latInput').value=settings.lat;$('lonInput').value=settings.lon;$('radiusInput').value=settings.radius;$('modeInput').value=settings.mode;$('settingsOverlay').classList.add('show')}
    function closeSettings(){$('settingsOverlay').classList.remove('show')}
    async function saveSettings(){settings.locSource=document.querySelector('input[name="locSource"]:checked').value;settings.photoBg=document.querySelector('input[name="photoBg"]:checked').value;settings.lat=parseFloat($('latInput').value)||settings.lat;settings.lon=parseFloat($('lonInput').value)||settings.lon;settings.radius=parseFloat($('radiusInput').value)||settings.radius;settings.mode=$('modeInput').value;await applyGps();localStorage.setItem(K,JSON.stringify(settings));closeSettings();loadWeather();loadAircraft()}
    $('openSettings').onclick=openSettings;$('cancelSettings').onclick=closeSettings;$('saveSettings').onclick=saveSettings;$('settingsOverlay').addEventListener('click',e=>{if(e.target.id==='settingsOverlay')closeSettings()});
    if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});tickClock();setInterval(tickClock,1000);applyGps().then(()=>{loadWeather();loadAircraft()});setInterval(loadAircraft,10000);setInterval(loadWeather,60000);
  </script>
</body>
</html>
