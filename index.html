<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>PlanePulse</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<meta name="theme-color" content="#FFC800">
<style>
@font-face{font-family:Airport;src:url('/fonts/Airport.woff2') format('woff2');font-weight:100 900;font-style:normal;font-display:swap;}
:root{--yellow:#FFC800;--bg:#0b0b0b;--white:#f4f4f0;--muted:#8d8d88;--line:rgba(255,200,0,.32);--font:Airport,"Helvetica Neue",Arial,sans-serif;}
*{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;background:#050505;color:var(--white);font-family:var(--font);overflow:hidden}button,input,select{font-family:var(--font)}
#app{position:relative;min-height:100vh;background:radial-gradient(circle at 50% 20%,#202020 0,#090909 58%,#020202 100%);overflow:hidden}.bg-photo{position:absolute;inset:0;background-size:cover;background-position:center;opacity:1;filter:saturate(.9) contrast(1.08);transition:opacity .3s}.overlay{position:absolute;inset:0;background:rgba(0,0,0,.50)}
.shell{position:relative;z-index:2;height:100vh;padding:22px 34px 26px;display:grid;grid-template-rows:auto 1fr auto}.top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;font-size:19px;letter-spacing:.08em;text-transform:uppercase}.brand{color:var(--yellow);font-size:18px;letter-spacing:.24em;font-weight:700}.weather{text-align:right;color:var(--white);display:flex;justify-content:flex-end;gap:18px}.settingsBtn{position:absolute;right:18px;top:18px;z-index:20;border:0;background:transparent;color:var(--yellow);font-size:24px;line-height:1;cursor:pointer;opacity:.85}.rule{height:1px;background:var(--line);width:100%;margin:20px 0}.hero{display:grid;grid-template-columns:230px 1fr 230px;align-items:center;min-height:0}.leftPane{display:flex;justify-content:center;align-items:center}.airlineLogo{width:145px;height:145px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--yellow);font-size:32px;font-weight:800;letter-spacing:.04em;background:rgba(0,0,0,.18);backdrop-filter:blur(6px)}
.centerPane{text-align:center;align-self:center}.flightCode{font-size:clamp(64px,11vw,145px);line-height:.92;font-weight:800;letter-spacing:.075em;color:var(--yellow);text-shadow:0 0 36px rgba(255,200,0,.15)}.planeIcon{width:88px;height:88px;margin:24px auto 10px;color:var(--white);filter:drop-shadow(0 0 14px rgba(255,200,0,.14))}.typeReg{font-size:clamp(22px,3vw,36px);letter-spacing:.12em;color:var(--white);font-weight:500}.nextRow{margin-top:17px;color:var(--muted);font-size:clamp(14px,1.55vw,20px);letter-spacing:.10em;white-space:nowrap}.rightPane{display:flex;justify-content:center;align-items:center}.compassBlock{text-align:center;min-width:120px}.trendArrow{font-size:38px;color:var(--yellow);line-height:1;margin-bottom:14px}.trendArrow.pulse{animation:pulse 1.8s ease-in-out infinite}@keyframes pulse{0%,100%{opacity:.62;transform:scale(.96)}50%{opacity:1;transform:scale(1.05)}}.compass{width:116px;height:116px;margin:0 auto;border:1px solid var(--line);border-radius:50%;display:grid;place-items:center;position:relative;color:var(--yellow);background:rgba(0,0,0,.20)}.compass:before{content:"";width:8px;height:8px;border-radius:50%;background:var(--yellow);box-shadow:0 0 15px rgba(255,200,0,.6)}.compassDir{margin-top:10px;color:var(--white);font-size:24px;letter-spacing:.15em}.compassArrow{position:absolute;inset:0;display:grid;place-items:center;font-size:42px;color:var(--yellow);transform:rotate(var(--deg,0deg))}.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center;padding:22px 0 5px}.metricVal{font-size:clamp(34px,5vw,64px);color:var(--white);font-weight:700;letter-spacing:.04em}.metricLabel{font-size:15px;color:var(--muted);letter-spacing:.18em;text-transform:uppercase;margin-top:9px}.metricIcon{height:25px;width:25px;color:var(--yellow);margin:0 auto 8px;opacity:.95}.status{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);color:var(--muted);font-size:24px;letter-spacing:.12em;text-transform:uppercase}.hide{display:none!important}
.settingsOverlay{position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.74);display:none}.settingsOverlay.open{display:block}.settingsPanel{position:fixed;right:22px;top:22px;bottom:22px;width:min(420px,calc(100vw - 44px));background:rgba(13,13,13,.96);border:1px solid var(--line);box-shadow:0 24px 80px rgba(0,0,0,.75);padding:24px;border-radius:20px;overflow:auto}.settingsHeader{display:flex;justify-content:space-between;align-items:center;color:var(--yellow);font-size:20px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:24px}.closeBtn{border:0;background:transparent;color:var(--yellow);font-size:28px;cursor:pointer}.group{border-top:1px solid var(--line);padding-top:16px;margin-top:18px}.groupTitle{color:var(--muted);text-transform:uppercase;letter-spacing:.18em;font-size:13px;margin-bottom:12px}.field{display:grid;grid-template-columns:1fr 1.35fr;gap:12px;align-items:center;margin:10px 0;color:var(--white)}.field input,.field select{background:#050505;color:var(--white);border:1px solid rgba(255,255,255,.16);padding:10px 12px;border-radius:10px}.radioRow{display:flex;gap:14px;flex-wrap:wrap}.radioRow label{color:var(--white);font-size:14px}.saveBtn{width:100%;margin-top:22px;background:var(--yellow);border:0;color:#000;padding:13px;border-radius:14px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;cursor:pointer}
@media(max-width:760px){.shell{padding:18px}.hero{grid-template-columns:1fr;gap:8px}.leftPane{order:1}.centerPane{order:2}.rightPane{order:3}.airlineLogo{width:86px;height:86px;font-size:22px}.flightCode{font-size:62px}.planeIcon{width:64px;height:64px;margin:14px auto 8px}.rightPane{margin-top:6px}.compass{width:82px;height:82px}.compassDir{font-size:18px}.metrics{padding-top:12px}.metricVal{font-size:30px}.metricLabel{font-size:11px}.nextRow{white-space:normal}.top{font-size:13px}.brand{font-size:13px}}
</style>
</head>
<body>
<div id="app">
  <div id="bgPhoto" class="bg-photo"></div><div class="overlay"></div>
  <button class="settingsBtn" id="settingsBtn" aria-label="Settings">⚙</button>
  <div class="shell">
    <header><div class="top"><div id="clock">--:--</div><div class="brand">PlanePulse</div><div class="weather"><span id="temp">--°C</span><span id="wind">-- km/h</span></div></div><div class="rule"></div></header>
    <main class="hero">
      <section class="leftPane"><div id="airlineLogo" class="airlineLogo">PP</div></section>
      <section class="centerPane">
        <div id="flightCode" class="flightCode">----</div>
        <svg class="planeIcon" viewBox="0 0 100 100" aria-hidden="true"><path fill="currentColor" d="M50 5c3 0 6 3 6 7v25l34 20c3 2 5 5 5 8v8L56 61v22l12 8v6L50 92 32 97v-6l12-8V61L5 73v-8c0-3 2-6 5-8l34-20V12c0-4 3-7 6-7z"/></svg>
        <div id="typeReg" class="typeReg">----</div>
        <div id="nextRow" class="nextRow"></div>
      </section>
      <section class="rightPane"><div class="compassBlock"><div id="trendArrow" class="trendArrow">→</div><div class="compass"><div id="compassArrow" class="compassArrow">↑</div></div><div id="compassDir" class="compassDir">---</div></div></section>
    </main>
    <footer><div class="rule"></div><div class="metrics">
      <div><svg class="metricIcon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2 4 20h16L12 2zm0 5.2L16.3 18H7.7L12 7.2z"/></svg><div id="distance" class="metricVal">--</div><div class="metricLabel">Distance</div></div>
      <div><svg class="metricIcon" viewBox="0 0 24 24"><path fill="currentColor" d="M4 18h16v2H4v-2zm2-4h12v2H6v-2zm2-4h8v2H8v-2zm2-4h4v2h-4V6z"/></svg><div id="altitude" class="metricVal">--</div><div class="metricLabel">Altitude</div></div>
      <div><svg class="metricIcon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 4a9 9 0 0 1 9 9c0 2.4-.9 4.6-2.4 6.2l-1.4-1.4A7 7 0 1 0 5 13h3l-4 4-4-4h3a9 9 0 0 1 9-9zm1 4v5.2l4 2.4-1 1.7-5-3V8h2z"/></svg><div id="speed" class="metricVal">--</div><div class="metricLabel">Speed</div></div>
    </div></footer>
  </div>
  <div id="status" class="status">Loading</div>
</div>
<div id="settingsOverlay" class="settingsOverlay"><div class="settingsPanel"><div class="settingsHeader"><span>Settings</span><button id="closeBtn" class="closeBtn">×</button></div>
  <div class="group"><div class="groupTitle">Location source</div><div class="radioRow"><label><input type="radio" name="locSource" value="fixed"> Fixed</label><label><input type="radio" name="locSource" value="gps"> Device GPS</label></div></div>
  <div class="group"><div class="groupTitle">Fixed location</div><label class="field"><span>Latitude</span><input id="latInput" type="number" step="0.0001"></label><label class="field"><span>Longitude</span><input id="lonInput" type="number" step="0.0001"></label></div>
  <div class="group"><div class="groupTitle">Display</div><label class="field"><span>Radius</span><select id="radiusInput"><option>25</option><option selected>50</option><option>100</option></select></label><label class="field"><span>Mode</span><select id="modeInput"><option value="closest">Closest</option><option value="lowest">Lowest</option><option value="audible">Most Audible</option></select></label><label class="field"><span>Aircraft photos</span><select id="photosInput"><option value="on">On - Experimental</option><option value="off">Off</option></select></label></div>
  <button id="saveBtn" class="saveBtn">Save</button>
</div></div>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(()=>{});}
const $=id=>document.getElementById(id);let settings=JSON.parse(localStorage.getItem('ppSettings')||'{}');settings={lat:60.293,lon:25.037,radius:50,source:'fixed',mode:'closest',photos:'on',...settings};
let currentPhotoKey='';
function saveSettings(){localStorage.setItem('ppSettings',JSON.stringify(settings));}
function fmt(n,d=0){return Number.isFinite(n)?n.toFixed(d):'--'}
function kmFromMeters(m){return m/1000}function ftToM(ft){return ft*0.3048}function knotsToKmh(k){return k*1.852}
function distKm(lat1,lon1,lat2,lon2){const R=6371,toRad=x=>x*Math.PI/180;const dLat=toRad(lat2-lat1),dLon=toRad(lon2-lon1);const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function bearing(lat1,lon1,lat2,lon2){const toRad=x=>x*Math.PI/180,toDeg=x=>x*180/Math.PI;const y=Math.sin(toRad(lon2-lon1))*Math.cos(toRad(lat2));const x=Math.cos(toRad(lat1))*Math.sin(toRad(lat2))-Math.sin(toRad(lat1))*Math.cos(toRad(lat2))*Math.cos(toRad(lon2-lon1));return (toDeg(Math.atan2(y,x))+360)%360;}
function dir(deg){const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];return dirs[Math.round(deg/22.5)%16];}
function getLat(a){return Number(a.lat ?? a.latitude)}function getLon(a){return Number(a.lon ?? a.lng ?? a.longitude)}
function regOf(a){return (a.r || a.reg || a.registration || '').trim().toUpperCase()}function typeOf(a){return (a.t || a.type || a.desc || a.aircraft_type || 'Aircraft').trim()}
function callsignOf(a){return (a.flight || a.callsign || a.call || a.hex || '----').trim()}
function airlineCode(call){return (call.match(/^[A-Z]{2,3}/)||['PP'])[0].slice(0,3)}
function airlineInitials(call){return airlineCode(call)}
function enrich(a){const la=getLat(a),lo=getLon(a);const distance=Number.isFinite(la)&&Number.isFinite(lo)?distKm(settings.lat,settings.lon,la,lo):9999;const brg=Number.isFinite(la)&&Number.isFinite(lo)?bearing(settings.lat,settings.lon,la,lo):0;const alt=Number(a.alt_baro??a.alt_geom??a.altitude);const spd=Number(a.gs??a.speed);const vr=Number(a.baro_rate??a.geom_rate??a.vert_rate??0);return {...a,_distance:distance,_bearing:brg,_altM:Number.isFinite(alt)?ftToM(alt):NaN,_speedKmh:Number.isFinite(spd)?knotsToKmh(spd):NaN,_vr:vr};}
function score(a){if(settings.mode==='lowest')return Number.isFinite(a._altM)?a._altM:999999;if(settings.mode==='audible')return (a._distance*2)+(Number.isFinite(a._altM)?a._altM/1000:20);return a._distance;}
async function updateWeather(){try{const r=await fetch(`/api/weather?lat=${settings.lat}&lon=${settings.lon}`);const w=await r.json();$('temp').textContent=w.temp==null?'--°C':`${Math.round(w.temp)}°C`;$('wind').textContent=w.wind==null?'-- km/h':`${Math.round(w.wind)} km/h`;}catch{}}
async function updatePhoto(a){if(settings.photos!=='on'){$('bgPhoto').style.backgroundImage='';return;}const reg=regOf(a),hex=(a.hex||a.icao||'').trim();const key=reg||hex;if(!key||key===currentPhotoKey)return;currentPhotoKey=key;try{const r=await fetch(`/api/photo?reg=${encodeURIComponent(reg)}&hex=${encodeURIComponent(hex)}`);const p=await r.json();$('bgPhoto').style.backgroundImage=p.photo?`url('${p.photo}')`:'';}catch{$('bgPhoto').style.backgroundImage='';}}
function render(main,list){$('status').classList.add('hide');const call=callsignOf(main);$('flightCode').textContent=call;$('airlineLogo').textContent=airlineInitials(call);const reg=regOf(main),typ=typeOf(main);$('typeReg').textContent=reg?`${typ} • ${reg}`:typ;const next=list.filter(x=>x!==main).sort((a,b)=>a._distance-b._distance).slice(0,2).map(x=>`${callsignOf(x)} ${fmt(x._distance,1)} km`).join(' | ');$('nextRow').textContent=next; $('distance').textContent=`${fmt(main._distance,1)} km`;$('altitude').textContent=Number.isFinite(main._altM)?`${Math.round(main._altM)} m`:'--';$('speed').textContent=Number.isFinite(main._speedKmh)?`${Math.round(main._speedKmh)} km/h`:'--';const brg=main._bearing||0;$('compassArrow').style.setProperty('--deg',`${brg}deg`);$('compassDir').textContent=dir(brg);let arrow='→';if(main._vr>128)arrow='↗';else if(main._vr<-128)arrow='↘';$('trendArrow').textContent=arrow;$('trendArrow').classList.toggle('pulse',arrow!=='→');updatePhoto(main);}
async function updateAircraft(){try{const r=await fetch(`/api/aircraft?lat=${settings.lat}&lon=${settings.lon}&radius=${settings.radius}`);const data=await r.json();let list=(data.aircraft||[]).map(enrich).filter(a=>Number.isFinite(a._distance));if(!list.length){$('status').classList.remove('hide');$('status').textContent='No data';return;}list=list.sort((a,b)=>score(a)-score(b));render(list[0],list);}catch(e){$('status').classList.remove('hide');$('status').textContent='No data';}}
function updateClock(){const d=new Date();$('clock').textContent=d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});}function loadSettingsUI(){document.querySelector(`input[name=locSource][value=${settings.source}]`).checked=true;$('latInput').value=settings.lat;$('lonInput').value=settings.lon;$('radiusInput').value=settings.radius;$('modeInput').value=settings.mode;$('photosInput').value=settings.photos;}
function tryGps(){if(settings.source!=='gps'||!navigator.geolocation)return;navigator.geolocation.getCurrentPosition(p=>{settings.lat=p.coords.latitude;settings.lon=p.coords.longitude;saveSettings();updateWeather();updateAircraft();},()=>{}, {enableHighAccuracy:true,timeout:8000,maximumAge:60000});}
$('settingsBtn').onclick=()=>{loadSettingsUI();$('settingsOverlay').classList.add('open')};$('closeBtn').onclick=()=>$('settingsOverlay').classList.remove('open');$('settingsOverlay').onclick=e=>{if(e.target.id==='settingsOverlay')$('settingsOverlay').classList.remove('open')};$('saveBtn').onclick=()=>{settings.source=document.querySelector('input[name=locSource]:checked').value;settings.lat=parseFloat($('latInput').value)||settings.lat;settings.lon=parseFloat($('lonInput').value)||settings.lon;settings.radius=parseFloat($('radiusInput').value)||50;settings.mode=$('modeInput').value;settings.photos=$('photosInput').value;currentPhotoKey='';saveSettings();$('settingsOverlay').classList.remove('open');tryGps();updateWeather();updateAircraft();};
updateClock();setInterval(updateClock,1000);loadSettingsUI();tryGps();updateWeather();updateAircraft();setInterval(updateAircraft,10000);setInterval(updateWeather,60000);
</script>
</body>
</html>
