<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PlanePulse" />
  <title>PlanePulse</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <style>
    :root{
      --yellow:#FFC800; --bg:#0f0f0f; --text:#fff; --muted:#8A8A8A; --line:rgba(255,200,0,.34);
      --soft:rgba(255,255,255,.07); --panel:rgba(0,0,0,.78);
      font-family: Inter, "SF Pro Display", "Segoe UI", Roboto, Arial, sans-serif;
    }
    *{box-sizing:border-box} html,body{height:100%;margin:0;background:var(--bg);color:var(--text);overflow:hidden}
    body{font-family:Inter,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif}
    .app{position:relative;min-height:100vh;width:100vw;display:flex;flex-direction:column;padding:clamp(16px,2.2vw,32px);isolation:isolate;background:radial-gradient(circle at 50% 20%,rgba(255,200,0,.10),transparent 32%),#0f0f0f}
    .photoBg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:1;z-index:-3;transition:background-image .25s ease}
    .photoOverlay{position:absolute;inset:0;background:rgba(0,0,0,.50);z-index:-2}
    .vignette{position:absolute;inset:0;background:radial-gradient(circle at center,transparent 25%,rgba(0,0,0,.68));z-index:-1}
    .topbar{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;font-size:clamp(16px,2.1vw,30px);font-weight:500;letter-spacing:.02em;color:rgba(255,255,255,.88);min-height:52px}
    .brand{font-size:clamp(14px,1.6vw,22px);letter-spacing:.42em;text-indent:.42em;color:#fff;text-transform:uppercase;font-weight:650;text-align:center;opacity:.95}
    .time{justify-self:start;color:var(--yellow);font-variant-numeric:tabular-nums}.weather{justify-self:end;color:var(--yellow);font-variant-numeric:tabular-nums;display:flex;gap:18px;align-items:center}.settingsBtn{border:0;background:transparent;color:var(--yellow);font-size:24px;cursor:pointer;margin-left:10px;line-height:1;opacity:.95}
    .rule{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);width:100%;margin:clamp(12px,2vw,22px) 0}
    .hero{position:relative;flex:1;display:grid;grid-template-columns:minmax(110px,23vw) 1fr minmax(110px,23vw);align-items:center;min-height:0;padding:0 clamp(2px,1vw,18px)}
    .airlinePanel{align-self:center;justify-self:center;width:min(19vw,220px);height:min(19vw,220px);display:flex;align-items:center;justify-content:center}
    .airlineLogo{max-width:100%;max-height:100%;object-fit:contain;filter:drop-shadow(0 10px 28px rgba(0,0,0,.55))}.airlineFallback{width:min(140px,14vw);height:min(140px,14vw);border:1px solid var(--line);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--yellow);font-size:clamp(22px,4vw,54px);font-weight:800;letter-spacing:.03em}
    .centerStage{text-align:center;align-self:center;justify-self:center;min-width:0;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(8px,1.15vw,18px)}
    .flightCode{font-size:clamp(54px,11vw,148px);line-height:.88;font-weight:780;letter-spacing:.035em;color:var(--yellow);text-shadow:0 12px 45px rgba(0,0,0,.6);font-variant-numeric:tabular-nums}.planeIcon{width:clamp(70px,9vw,132px);height:clamp(70px,9vw,132px);color:#fff;opacity:.94;filter:drop-shadow(0 12px 30px rgba(0,0,0,.65))}.typeReg{font-size:clamp(18px,3.2vw,46px);line-height:1.1;font-weight:520;letter-spacing:.08em;color:#fff;text-transform:uppercase}.nextNearby{font-size:clamp(12px,1.55vw,24px);letter-spacing:.06em;color:var(--muted);white-space:nowrap;min-height:1.2em;font-weight:450}.noData{color:var(--yellow);font-size:clamp(22px,4.2vw,60px);letter-spacing:.16em;text-transform:uppercase}
    .compassPanel{align-self:center;justify-self:center;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:clamp(16px,2.3vw,34px);min-width:110px}.trendArrow{font-size:clamp(28px,5.2vw,70px);line-height:1;color:var(--yellow);text-shadow:0 0 18px rgba(255,200,0,.25)}.compass{position:relative;width:clamp(90px,12vw,172px);height:clamp(90px,12vw,172px);border:1px solid rgba(255,200,0,.50);border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.9);box-shadow:inset 0 0 38px rgba(255,200,0,.07)}.compass:before,.compass:after{content:"";position:absolute;background:rgba(255,200,0,.42)}.compass:before{width:1px;height:76%;left:50%;top:12%}.compass:after{height:1px;width:76%;left:12%;top:50%}.dirArrow{position:absolute;font-size:clamp(28px,4vw,56px);color:var(--yellow);transform-origin:center}.dirText{position:absolute;bottom:14%;font-size:clamp(13px,1.5vw,22px);font-weight:650;letter-spacing:.12em;color:#fff}.cardinal{position:absolute;font-size:clamp(9px,1vw,14px);color:rgba(255,255,255,.36);font-weight:600}.n{top:7px}.s{bottom:7px}.w{left:9px}.e{right:9px}
    .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center;padding:clamp(12px,1.8vw,22px) 0}.metric{display:flex;flex-direction:column;gap:clamp(4px,.75vw,8px);align-items:center;justify-content:center}.metricIcon{height:clamp(18px,2vw,30px);color:var(--yellow);opacity:.96}.metricValue{font-size:clamp(26px,4.6vw,68px);line-height:1;font-weight:650;color:#fff;font-variant-numeric:tabular-nums}.metricLabel{font-size:clamp(12px,1.3vw,20px);text-transform:uppercase;color:var(--muted);letter-spacing:.16em}.footer{display:flex;justify-content:center;gap:10px;font-size:clamp(10px,1.05vw,14px);letter-spacing:.15em;text-transform:uppercase;color:rgba(255,255,255,.38)}
    .settingsOverlay{position:fixed;inset:0;display:none;background:rgba(0,0,0,.72);z-index:9998;backdrop-filter:blur(4px)}.settingsOverlay.open{display:block}.settingsPanel{position:fixed;right:clamp(12px,2vw,28px);top:clamp(12px,2vw,28px);bottom:clamp(12px,2vw,28px);width:min(420px,calc(100vw - 24px));z-index:9999;background:rgba(12,12,12,.96);border:1px solid var(--line);border-radius:22px;padding:22px;overflow:auto;box-shadow:0 22px 80px rgba(0,0,0,.65)}.settingsPanel h2{margin:0 0 18px;color:var(--yellow);letter-spacing:.08em;text-transform:uppercase}.settingGroup{border-top:1px solid rgba(255,200,0,.24);padding:16px 0}.settingGroup label{display:block;color:#fff;margin:10px 0 6px;font-size:14px;letter-spacing:.04em}.settingGroup input,.settingGroup select{width:100%;border:1px solid rgba(255,200,0,.35);background:#111;color:#fff;border-radius:10px;padding:11px 12px;font-size:16px}.radioRow{display:flex;gap:10px;flex-wrap:wrap}.choice{border:1px solid rgba(255,200,0,.35);border-radius:999px;padding:9px 13px;color:#ddd;cursor:pointer}.choice input{width:auto;margin-right:7px}.buttons{display:flex;justify-content:flex-end;gap:10px;margin-top:12px}.btn{border:1px solid rgba(255,200,0,.45);background:transparent;color:#fff;border-radius:12px;padding:12px 16px;cursor:pointer}.btn.primary{background:var(--yellow);color:#0b0b0b;border-color:var(--yellow);font-weight:700}.status{font-size:13px;color:var(--muted);margin-top:8px;line-height:1.35}
    @media(max-width:760px){.hero{grid-template-columns:1fr;grid-template-rows:auto auto auto;gap:10px}.airlinePanel{position:absolute;left:0;top:4%;width:100px;height:100px}.compassPanel{position:absolute;right:0;top:44%;transform:scale(.75);transform-origin:right center}.flightCode{font-size:18vw}.nextNearby{white-space:normal}.metrics{gap:4px}.brand{letter-spacing:.22em;text-indent:.22em}}
  </style>
</head>
<body>
  <div class="app">
    <div id="photoBg" class="photoBg"></div><div class="photoOverlay"></div><div class="vignette"></div>
    <header class="topbar"><div class="time" id="time">--:--</div><div class="brand">PlanePulse</div><div class="weather"><span id="temp">--°C</span><span id="wind">-- m/s</span><button class="settingsBtn" id="openSettings" aria-label="Settings">⚙</button></div></header>
    <div class="rule"></div>
    <main class="hero">
      <aside class="airlinePanel" id="airlineBox"><div class="airlineFallback">PP</div></aside>
      <section class="centerStage">
        <div class="flightCode" id="flightCode">----</div>
        <svg class="planeIcon" viewBox="0 0 100 100" aria-hidden="true"><path fill="currentColor" d="M50 5c3.2 0 6 2.5 6 6v27l31 18c2.4 1.4 3.8 4 3.8 6.8v6.6L56 58v20l12 9v6L50 88l-18 5v-6l12-9V58L9.2 69.4v-6.6c0-2.8 1.4-5.4 3.8-6.8l31-18V11c0-3.5 2.8-6 6-6z"/></svg>
        <div class="typeReg" id="typeReg">Aircraft type</div>
        <div class="nextNearby" id="nextNearby">-- km | -- km</div>
      </section>
      <aside class="compassPanel"><div class="trendArrow" id="trendArrow">→</div><div class="compass"><span class="cardinal n">N</span><span class="cardinal s">S</span><span class="cardinal w">W</span><span class="cardinal e">E</span><div class="dirArrow" id="dirArrow">↗</div><div class="dirText" id="dirText">--</div></div></aside>
    </main>
    <div class="rule"></div>
    <section class="metrics">
      <div class="metric"><svg class="metricIcon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2 4 20h16L12 2zm0 5.7 4.4 9.8H7.6L12 7.7z"/></svg><div class="metricValue" id="distance">--</div><div class="metricLabel">Distance</div></div>
      <div class="metric"><svg class="metricIcon" viewBox="0 0 24 24"><path fill="currentColor" d="M12 3 3 13h5v8h8v-8h5L12 3z"/></svg><div class="metricValue" id="altitude">--</div><div class="metricLabel">Altitude</div></div>
      <div class="metric"><svg class="metricIcon" viewBox="0 0 24 24"><path fill="currentColor" d="M4 13a8 8 0 1 1 16 0h-2a6 6 0 1 0-12 0H4zm8 1 5-5-3.2 6.1A2 2 0 1 1 12 14z"/></svg><div class="metricValue" id="speed">--</div><div class="metricLabel">Speed</div></div>
    </section>
    <div class="footer"><span>Live ADS-B data</span><span id="updated">Updated --</span></div>
  </div>
  <div class="settingsOverlay" id="settingsOverlay"><div class="settingsPanel"><h2>Settings</h2><div class="settingGroup"><label>Location source</label><div class="radioRow"><label class="choice"><input type="radio" name="locSource" value="fixed">Fixed location</label><label class="choice"><input type="radio" name="locSource" value="gps">Device GPS</label></div><div class="status" id="gpsStatus">Using fixed location</div></div><div class="settingGroup"><label>Latitude</label><input id="latInput" inputmode="decimal"><label>Longitude</label><input id="lonInput" inputmode="decimal"><label>Radius km</label><input id="radiusInput" inputmode="numeric"></div><div class="settingGroup"><label>Display mode</label><select id="modeInput"><option value="closest">Closest aircraft</option><option value="lowest">Lowest aircraft</option><option value="audible">Most audible aircraft</option></select></div><div class="settingGroup"><label>Aircraft photo background</label><select id="photoInput"><option value="on">On (Experimental)</option><option value="off">Off</option></select></div><div class="buttons"><button class="btn" id="cancelSettings">Cancel</button><button class="btn primary" id="saveSettings">Save</button></div></div></div>
  <script>
    const $=id=>document.getElementById(id);
    const defaults={lat:60.293,lon:25.037,radius:50,mode:'closest',locSource:'fixed',photo:'on'};
    let settings={...defaults,...JSON.parse(localStorage.getItem('pp_settings')||'{}')};
    let gpsPos=null, lastPhotoKey='';
    const airlineLogos={FIN:'https://content.airhex.com/content/logos/airlines_FIN_350_100_r.png',RYR:'https://content.airhex.com/content/logos/airlines_RYR_350_100_r.png',DLH:'https://content.airhex.com/content/logos/airlines_DLH_350_100_r.png',SAS:'https://content.airhex.com/content/logos/airlines_SAS_350_100_r.png',KLM:'https://content.airhex.com/content/logos/airlines_KLM_350_100_r.png',AFR:'https://content.airhex.com/content/logos/airlines_AFR_350_100_r.png',BAW:'https://content.airhex.com/content/logos/airlines_BAW_350_100_r.png',NSZ:'https://content.airhex.com/content/logos/airlines_NSZ_350_100_r.png',TAY:'https://content.airhex.com/content/logos/airlines_TAY_350_100_r.png'};
    function save(){localStorage.setItem('pp_settings',JSON.stringify(settings))}
    function now(){const d=new Date();$('time').textContent=d.toLocaleTimeString('fi-FI',{hour:'2-digit',minute:'2-digit'});} setInterval(now,1000); now();
    function kmToNm(km){return Math.max(1,Math.round(km/1.852))}
    function rad(x){return x*Math.PI/180} function deg(x){return x*180/Math.PI}
    function distanceKm(a,b,c,d){const R=6371;const x=rad(c-a),y=rad(d-b);const q=Math.sin(x/2)**2+Math.cos(rad(a))*Math.cos(rad(c))*Math.sin(y/2)**2;return 2*R*Math.atan2(Math.sqrt(q),Math.sqrt(1-q))}
    function bearing(a,b,c,d){const y=Math.sin(rad(d-b))*Math.cos(rad(c));const x=Math.cos(rad(a))*Math.sin(rad(c))-Math.sin(rad(a))*Math.cos(rad(c))*Math.cos(rad(d-b));return (deg(Math.atan2(y,x))+360)%360}
    const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW']; function dirName(b){return dirs[Math.round(b/22.5)%16]}
    function fmt(v,u=''){return (v===null||v===undefined||Number.isNaN(v))?'--':`${v}${u}`}
    function callsign(ac){return (ac.flight||ac.call||ac.callsign||ac.r||ac.hex||'----').trim()}
    function typeReg(ac){const t=(ac.t||ac.type||ac.aircraft_type||'Aircraft').trim(); const r=(ac.r||ac.reg||ac.registration||'').trim(); return r?`${t} • ${r}`:t}
    function airlinePrefix(cs){const m=(cs||'').match(/^[A-Z]{2,3}/);return m?m[0]:''}
    function renderLogo(cs){const pref=airlinePrefix(cs); const url=airlineLogos[pref]; if(url){$('airlineBox').innerHTML=`<img class="airlineLogo" src="${url}" onerror="this.parentNode.innerHTML='<div class=&quot;airlineFallback&quot;>${pref||'PP'}</div>'">`}else{$('airlineBox').innerHTML=`<div class="airlineFallback">${pref||'PP'}</div>`}}
    function trend(ac){const vr=Number(ac.baro_rate??ac.geom_rate??ac.vsi??0); if(vr>120)return '↗'; if(vr<-120)return '↘'; return '→'}
    function choose(list){if(!list.length)return null; if(settings.mode==='lowest')return [...list].sort((a,b)=>(a.alt_m??999999)-(b.alt_m??999999))[0]; if(settings.mode==='audible')return [...list].sort((a,b)=>b.audible-a.audible)[0]; return [...list].sort((a,b)=>a.dist_km-b.dist_km)[0]}
    function twoNext(list,main){return list.filter(a=>a!==main).sort((a,b)=>a.dist_km-b.dist_km).slice(0,2).map(a=>`${callsign(a)} ${a.dist_km.toFixed(1)} km`).join(' | ')}
    async function loadWeather(lat,lon){try{const r=await fetch(`/api/weather?lat=${lat}&lon=${lon}`);const j=await r.json();$('temp').textContent=fmt(j.temperature,'°C');$('wind').textContent=fmt(j.wind,' m/s')}catch(e){}}
    async function loadPhoto(ac){if(settings.photo!=='on'){$('photoBg').style.backgroundImage='';return} const key=(ac.r||ac.reg||ac.registration||ac.hex||'').trim(); if(!key||key===lastPhotoKey)return; lastPhotoKey=key; try{const r=await fetch(`/api/photo?reg=${encodeURIComponent(key)}&hex=${encodeURIComponent(ac.hex||'')}`);const j=await r.json();$('photoBg').style.backgroundImage=j.url?`url('${j.url}')`:''}catch(e){$('photoBg').style.backgroundImage=''}}
    async function load(){const lat=settings.locSource==='gps'&&gpsPos?gpsPos.lat:Number(settings.lat); const lon=settings.locSource==='gps'&&gpsPos?gpsPos.lon:Number(settings.lon); loadWeather(lat,lon); try{const r=await fetch(`/api/aircraft?lat=${lat}&lon=${lon}&dist=${kmToNm(Number(settings.radius))}`);const j=await r.json();const raw=j.aircraft||j.ac||[];const list=raw.filter(a=>a.lat&&a.lon).map(a=>{const dk=distanceKm(lat,lon,a.lat,a.lon);const br=bearing(lat,lon,a.lat,a.lon);const alt_m=Math.round(((a.alt_baro==='ground'?0:(a.alt_geom??a.alt_baro??a.altitude))||0)*0.3048);const sp=Math.round((a.gs||a.speed||0)*1.852);return {...a,dist_km:dk,bearing:br,alt_m,speed_kmh:sp,audible:(100-dk*1.5)+Math.max(0,3000-alt_m)/45}});const main=choose(list); if(!main){$('flightCode').textContent='NO DATA';$('typeReg').textContent='';$('distance').textContent='--';$('altitude').textContent='--';$('speed').textContent='--';$('nextNearby').textContent='';return} const cs=callsign(main);$('flightCode').textContent=cs;$('typeReg').textContent=typeReg(main);$('nextNearby').textContent=twoNext(list,main);$('distance').textContent=`${main.dist_km.toFixed(1)} km`;$('altitude').textContent=`${main.alt_m} m`;$('speed').textContent=`${main.speed_kmh} km/h`;renderLogo(cs);const tr=trend(main);$('trendArrow').textContent=tr;$('dirArrow').textContent=tr==='→'?'↗':tr;$('dirText').textContent=dirName(main.bearing);$('dirArrow').style.transform=`rotate(${main.bearing-45}deg)`;$('updated').textContent='Updated '+new Date().toLocaleTimeString('fi-FI',{hour:'2-digit',minute:'2-digit'});loadPhoto(main)}catch(e){$('flightCode').textContent='NO DATA';}}
    function startGps(){if(!navigator.geolocation){$('gpsStatus').textContent='GPS not available';return} navigator.geolocation.watchPosition(p=>{gpsPos={lat:p.coords.latitude,lon:p.coords.longitude};$('gpsStatus').textContent=`Using device GPS ±${Math.round(p.coords.accuracy)} m`;load()},err=>{$('gpsStatus').textContent='GPS denied, using fixed location';settings.locSource='fixed';save()},{enableHighAccuracy:true,maximumAge:30000,timeout:12000})}
    function syncSettings(){document.querySelectorAll('input[name=locSource]').forEach(x=>x.checked=x.value===settings.locSource);$('latInput').value=settings.lat;$('lonInput').value=settings.lon;$('radiusInput').value=settings.radius;$('modeInput').value=settings.mode;$('photoInput').value=settings.photo;$('gpsStatus').textContent=settings.locSource==='gps'?'Using device GPS':'Using fixed location'}
    $('openSettings').onclick=()=>{syncSettings();$('settingsOverlay').classList.add('open')};$('cancelSettings').onclick=()=>$('settingsOverlay').classList.remove('open');$('settingsOverlay').onclick=e=>{if(e.target===$('settingsOverlay'))$('settingsOverlay').classList.remove('open')};$('saveSettings').onclick=()=>{settings={...settings,locSource:[...document.querySelectorAll('input[name=locSource]')].find(x=>x.checked)?.value||'fixed',lat:Number($('latInput').value)||defaults.lat,lon:Number($('lonInput').value)||defaults.lon,radius:Number($('radiusInput').value)||50,mode:$('modeInput').value,photo:$('photoInput').value};save();$('settingsOverlay').classList.remove('open');if(settings.locSource==='gps')startGps();load()};
    if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});syncSettings();if(settings.locSource==='gps')startGps();load();setInterval(load,10000);
  </script>
</body>
</html>
